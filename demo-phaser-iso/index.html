      let stableViewportMetrics = null;

      function hasEditableFocus() {
        const active = document.activeElement;
        if (!active) return false;
        const tag = active.tagName;
        return tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || active.isContentEditable;
      }

      function readViewportMetrics() {
        const viewport = window.visualViewport;
        const layoutWidth = Math.max(1, Math.floor(window.innerWidth || document.documentElement.clientWidth || viewport?.width || DESIGN_W));
        const layoutHeight = Math.max(1, Math.floor(window.innerHeight || document.documentElement.clientHeight || viewport?.height || DESIGN_H));
        const width = Math.max(1, Math.floor(viewport?.width || layoutWidth));
        const height = Math.max(1, Math.floor(viewport?.height || layoutHeight));
        return {
          width,
          height,
          left: viewport?.offsetLeft || 0,
          top: viewport?.offsetTop || 0,
          layoutWidth,
          layoutHeight,
        };
      }

      function isKeyboardViewport(metrics) {
        const baselineHeight = stableViewportMetrics?.height || metrics.layoutHeight;
        return hasEditableFocus() && baselineHeight - metrics.height > KEYBOARD_SHRINK_THRESHOLD;
      }

      function getViewportMetrics({ visible = false } = {}) {
        const metrics = readViewportMetrics();
        const keyboardOpen = isKeyboardViewport(metrics);
        if (!keyboardOpen && !visible) {
          stableViewportMetrics = {
            width: metrics.width,
            height: metrics.height,
            left: metrics.left,
            top: metrics.top,
          };
        }
        if (visible || !keyboardOpen || !stableViewportMetrics) {
          return { ...metrics, keyboardOpen };
        }
        return {
          ...metrics,
          width: stableViewportMetrics.width,
          height: stableViewportMetrics.height,
          left: stableViewportMetrics.left,
          top: stableViewportMetrics.top,
          keyboardOpen,
        };
      }

      function applyAppViewportSize() {
        const metrics = getViewportMetrics();
        document.documentElement.style.setProperty("--app-width", `${metrics.width}px`);
        document.documentElement.style.setProperty("--app-height", `${metrics.height}px`);
        document.documentElement.style.setProperty("--visible-height", `${readViewportMetrics().height}px`);
        if (document.body) document.body.dataset.viewport = `${metrics.width}x${metrics.height}`;
        if (document.body) document.body.dataset.keyboardOpen = metrics.keyboardOpen ? "true" : "false";
        return metrics;
      }

      function refreshResponsiveViewport() {
        const metrics = applyAppViewportSize();
        const game = window.__phaserGame;
        if (game?.scale && !metrics.keyboardOpen) game.scale.refresh();
        game?.scene?.scenes?.forEach((scene) => {
          if (scene?.refreshRenderInfo && !metrics.keyboardOpen) scene.refreshRenderInfo();
          if (scene?.positionIntakeOverlay) scene.positionIntakeOverlay();
        });
        return metrics;
      }

        if (viewportRefreshFrame) window.cancelAnimationFrame(viewportRefreshFrame);
        viewportRefreshFrame = window.requestAnimationFrame(() => {
          viewportRefreshFrame = 0;
          refreshResponsiveViewport();
        });
      }

      function getHouseMeta(houseKey) {
        return WELLNESS_HOUSES.find((house) => house.key === houseKey) || WELLNESS_HOUSES[0];
      }

      function getHouseToolCount(houseKey) {
        return WELLNESS_TOOLS.filter((tool) => tool.house === houseKey).length;
      }

      function getDimensionProfile(profileOutput, key) {
        return profileOutput.dimensionValues.find((item) => item.key === key) || null;
      }

      function getXinyuStateDiagnosis(profileOutput) {
        const stateKey = profileOutput.currentState?.value || "neutral";
        const fallback = XINYU_STATES[stateKey] || XINYU_STATES.neutral;
        return {
          key: stateKey,
          label: profileOutput.currentState?.label || fallback.label,
          title: fallback.title,
          description: fallback.description,
          direction: fallback.direction,
          recommendation: fallback.recommendation,
          color: fallback.color,
        };
      }

      function getWellnessRecommendations(profileOutput, houseKey = null) {
        const diagnosis = getXinyuStateDiagnosis(profileOutput);
        return WELLNESS_TOOLS
          .filter((tool) => !houseKey || tool.house === houseKey)
          .map((tool) => {
            const matchedReasons = [];
            let score = 10 + (tool.stateBonus[diagnosis.key] || 0);
            if (tool.stateReason[diagnosis.key]) {
              matchedReasons.push(tool.stateReason[diagnosis.key]);
            }
            tool.dimensionRules.forEach((rule) => {
              const dimension = getDimensionProfile(profileOutput, rule.key);
              if (dimension && dimension.polarity === rule.polarity) {
                score += rule.points;
                matchedReasons.push(rule.reason);
              }
            });
            const house = getHouseMeta(tool.house);
            return {
              tool,
              house,
              score,
              reason: matchedReasons[0] || tool.summary,
              matchedReasons,
            };
          })
          .sort((a, b) => b.score - a.score || a.tool.title.localeCompare(b.tool.title, "zh-CN"));
      }

        ensureIntakeDraft() {
          if (!this.gameplay.intakeDraft) this.gameplay.intakeDraft = {};
          if (!this.gameplay.intakeDraft.mbtiLetters) {
            this.gameplay.intakeDraft.mbtiLetters = { energy: "I", info: "N", decision: "F", structure: "P" };
          }
          if (!this.gameplay.intakeDraft.body) {
            this.gameplay.intakeDraft.body = { mode: "text", activeSubmitMode: null, text: "", fileName: "", fileType: "", voiceTranscript: "", voiceDurationMs: 0 };
          }
          if (!this.gameplay.intakeDraft.bazi) {
            this.gameplay.intakeDraft.bazi = { year: 1998, month: 7, day: 5, hour: 12, minute: 0, timeDefaulted: true };
          }
          if (!this.gameplay.intakeDraft.psychologyQuestionKeys) this.gameplay.intakeDraft.psychologyQuestionKeys = [];
          if (!this.gameplay.intakeDraft.psychologyAnswers) this.gameplay.intakeDraft.psychologyAnswers = {};
          if (typeof this.gameplay.intakeDraft.psychologyActiveIndex !== "number") this.gameplay.intakeDraft.psychologyActiveIndex = 0;
          if (!("psychologyActiveQuestionKey" in this.gameplay.intakeDraft)) this.gameplay.intakeDraft.psychologyActiveQuestionKey = null;
          return this.gameplay.intakeDraft;
        }

        hashString(value) {
          return String(value || "0704hks").split("").reduce((hash, char) => ((hash << 5) - hash + char.charCodeAt(0)) | 0, 0);
        }

        getSignalByCategory(category) {
          return this.gameplay.signals.find((signal) => signal.category === category);
        }

        getPsychologyQuestions() {
          const draft = this.ensureIntakeDraft();
          if (draft.psychologyQuestionKeys.length !== 3) {
            const tags = new Set(["default"]);
            this.gameplay.signals.forEach((signal) => {
              if (signal.category) tags.add(signal.category);
              if (signal.type) tags.add(signal.type);
              if (String(signal.value || "").includes("睡")) tags.add("sleep");
              if (String(signal.value || "").includes("疲")) tags.add("fatigue");
            });
            const seedText = this.gameplay.signals.map((signal) => `${signal.category}:${signal.value}`).join("|") || "psychology";
            const seed = Math.abs(this.hashString(seedText));
            draft.psychologyQuestionKeys = PSYCHOLOGY_QUESTION_BANK
              .map((question, index) => {
                const tagScore = question.tags.reduce((score, tag) => score + (tags.has(tag) ? 3 : 0), 0);
                const randomScore = ((seed + index * 17) % 11) / 10;
                return { question, score: tagScore + randomScore };
              })
              .sort((a, b) => b.score - a.score)
              .slice(0, 3)
              .map((item) => item.question.key);
          }
          return draft.psychologyQuestionKeys
            .map((key) => PSYCHOLOGY_QUESTION_BANK.find((question) => question.key === key))
            .filter(Boolean)
            .slice(0, 3);
        }

        escapeHtml(value) {
          return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;");
        }

        getMbtiTypeFromDraft() {
          const letters = this.ensureIntakeDraft().mbtiLetters;
          return `${letters.energy}${letters.info}${letters.decision}${letters.structure}`;

        hideIntakeOverlay() {
          const overlay = this.getIntakeOverlay();
          if (!overlay) return;

          overlay.dataset.visible = "false";
          overlay.dataset.mode = "";

        positionIntakeOverlay(stepKey = this.gameplay.activeIntake) {
          const overlay = this.getIntakeOverlay();
          const canvas = this.game?.canvas;
          if (!overlay || !canvas || overlay.dataset.visible !== "true") return;
          const rect = canvas.getBoundingClientRect();
          const scaleX = rect.width / DESIGN_W;
          const scaleY = rect.height / DESIGN_H;
          const boxes = {
            mbti: { x: 24, y: 504, w: 342, h: 286 },
            body: { x: 24, y: 488, w: 342, h: 330 },
            bazi: { x: 20, y: 500, w: 350, h: 202 },
            psychology: { x: 24, y: 498, w: 342, h: 300 },
            wellness: { x: 20, y: 536, w: 350, h: 288 },
          };
          const box = overlay.dataset.mode === "wellness" ? boxes.wellness : boxes[stepKey] || boxes.mbti;
          const viewport = getViewportMetrics({ visible: true });
          const margin = 12;
          const viewportLeft = viewport.left + margin;
          const viewportTop = viewport.top + margin;
          const viewportRight = viewport.left + viewport.width - margin;
          const viewportBottom = viewport.top + viewport.height - margin;
          const preferredWidth = Math.min(box.w * scaleX, viewport.width - margin * 2);
          const baseLeft = rect.left + box.x * scaleX;
          const left = Math.min(Math.max(baseLeft, viewportLeft), Math.max(viewportLeft, viewportRight - preferredWidth));

          overlay.style.left = `${left}px`;
          overlay.style.width = `${preferredWidth}px`;
          overlay.style.height = "auto";
          overlay.style.minHeight = "0";
          overlay.style.maxHeight = "";

          const contentHeight = overlay.firstElementChild?.scrollHeight || 0;
          const preferredHeight = Math.max(box.h * scaleY, contentHeight);
          const baseTop = rect.top + box.y * scaleY;
          const maxVisibleHeight = Math.max(96, viewport.height - margin * 2);
          const visibleHeight = Math.min(preferredHeight, maxVisibleHeight);
          const top = Math.min(Math.max(baseTop, viewportTop), Math.max(viewportTop, viewportBottom - visibleHeight));
          const height = Math.min(visibleHeight, Math.max(96, viewportBottom - top));

          overlay.style.top = `${top}px`;
          overlay.style.height = `${height}px`;
          overlay.style.maxHeight = `${height}px`;
          overlay.style.minHeight = `${height}px`;
          document.body.dataset.overlayBox = `${Math.round(left)},${Math.round(top)},${Math.round(preferredWidth)},${Math.round(height)}`;
        }

        renderNativeIntakeOverlay(step) {

            this.hideIntakeOverlay();

          overlay.dataset.visible = "true";
          overlay.dataset.step = step.key;
          overlay.innerHTML = html;
          this.positionIntakeOverlay(step.key);
          window.requestAnimationFrame(() => this.positionIntakeOverlay(step.key));
          this.bindNativeIntakeOverlay(step.key);

        getBaziOverlayHtml() {

          return `

            questions.findIndex((item) => item.key === draft.psychologyActiveQuestionKey),
            0,
            questions.length - 1
          );
          draft.psychologyActiveIndex = activeIndex;
          const question = questions[activeIndex];
          const answeredCount = questions.filter((item) => draft.psychologyAnswers[item.key]).length;
          const choices = (question.choices || [question.answer]).map((choice) => `
            <button class="choice-button" type="button" data-psych-choice="${this.escapeHtml(choice)}" aria-pressed="${draft.psychologyAnswers[question.key] === choice}">
              ${this.escapeHtml(choice)}

                <p class="intake-kicker">${meta.name} · 第 ${activeIndex + 1}/3 题 · 已答 ${answeredCount}/3</p>

        bindNativeIntakeOverlay(stepKey) {
          const overlay = this.getIntakeOverlay();

          if (stepKey === "mbti") this.bindMbtiOverlay(overlay);
          if (stepKey === "body") this.bindBodyOverlay(overlay);
          if (stepKey === "bazi") this.bindBaziOverlay(overlay);
          if (stepKey === "psychology") this.bindPsychologyOverlay(overlay);
        }

        bindOverlayViewportGuards(overlay, stepKey) {
          overlay.onfocusin = () => {
            overlay.dataset.focusedInput = "true";
            window.requestAnimationFrame(() => this.positionIntakeOverlay(stepKey));
            window.setTimeout(() => this.positionIntakeOverlay(stepKey), 260);
          };
          overlay.onfocusout = () => {
            overlay.dataset.focusedInput = "false";
            window.setTimeout(requestResponsiveViewportRefresh, 120);
          };
        }

        bindMbtiOverlay(overlay) {
          overlay.querySelectorAll("[data-mbti-field]").forEach((button) => {
            button.addEventListener("click", () => {
              const draft = this.ensureIntakeDraft();
              draft.mbtiLetters[button.dataset.mbtiField] = button.dataset.mbtiValue;
              this.syncGameplayState();
              this.renderNativeIntakeOverlay(INTAKE_STEPS.find((step) => step.key === "mbti"));
            });
          });
          overlay.querySelector("[data-action='submit-mbti']")?.addEventListener("click", () => this.submitMbtiNative());
        }

        bindBodyOverlay(overlay) {
          overlay.querySelectorAll("[data-body-mode]").forEach((button) => {
            button.addEventListener("click", () => {
              const body = this.ensureIntakeDraft().body;
              body.mode = button.dataset.bodyMode;
              body.activeSubmitMode = button.dataset.bodyMode;
              this.renderNativeIntakeOverlay(INTAKE_STEPS.find((step) => step.key === "body"));
            });
          });
          overlay.querySelector("[data-body-text]")?.addEventListener("input", (event) => {
            this.ensureIntakeDraft().body.text = event.target.value;
          });
          overlay.querySelector("[data-body-voice-note]")?.addEventListener("input", (event) => {
            this.ensureIntakeDraft().body.voiceTranscript = event.target.value;
          });
          overlay.querySelector("[data-body-file]")?.addEventListener("change", (event) => {
            const file = event.target.files?.[0];
            const body = this.ensureIntakeDraft().body;
            body.fileName = file?.name || "";
            body.fileType = file?.type || "";
            body.fileSize = file?.size || 0;
            this.renderNativeIntakeOverlay(INTAKE_STEPS.find((step) => step.key === "body"));
          });
          overlay.querySelector("[data-action='start-record']")?.addEventListener("click", () => this.startBodyRecording());
          overlay.querySelector("[data-action='stop-record']")?.addEventListener("click", () => this.stopBodyRecording());
          overlay.querySelector("[data-action='close-body']")?.addEventListener("click", () => {
            this.ensureIntakeDraft().body.activeSubmitMode = null;
            this.hideIntakeOverlay();
          });
          overlay.querySelector("[data-action='submit-body']")?.addEventListener("click", () => this.submitBodyNative());

          const unknownInput = overlay.querySelector("[data-bazi-unknown]");

            input.addEventListener("input", () => this.updateBaziFromNativeInputs(overlay, unknownInput));

          });

          });
          overlay.querySelector("[data-action='skip-bazi']")?.addEventListener("click", () => {
            this.moveHeroTo(306, 562, () => {
              this.skipIntake("bazi");
              this.advanceAfterIntakeCommit("bazi", 0xc0b7ca);
            }, { color: 0xc0b7ca, mood: "focus" });
          });
        }

        bindPsychologyOverlay(overlay) {
          overlay.querySelectorAll("[data-psych-choice]").forEach((button) => {
            button.addEventListener("click", () => this.choosePsychologyAnswer(button.dataset.psychChoice));
          });

            this.ensureIntakeDraft().psychologyActiveQuestionKey = null;

        submitMbtiNative() {
          if (this.heroBusy) return;
          const type = this.getMbtiTypeFromDraft();
          const payload = {
            key: type.toLowerCase(),
            label: type,
            type: "mbti_known",
            value: `用户自报 MBTI 类型：${type}`,
            confidence: "user_reported",
            normalized_value: {

        async startBodyRecording() {
          const body = this.ensureIntakeDraft().body;
          if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === "undefined") {
            this.setOverlayStatus("当前浏览器不支持录音，先用文字或图片提交。", "[data-voice-status]");
            return;
          }
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            this.mediaChunks = [];
            this.mediaStartedAt = Date.now();
            this.mediaRecorder = new MediaRecorder(stream);
            this.mediaRecorder.ondataavailable = (event) => {
              if (event.data?.size) this.mediaChunks.push(event.data);
            };
            this.mediaRecorder.onstop = () => {
              stream.getTracks().forEach((track) => track.stop());
              body.mode = "voice";
              body.voiceDurationMs = Math.max(1000, Date.now() - this.mediaStartedAt);
              body.voiceTranscript ||= "用户提交了一段语音身体描述，等待转写。";
              this.renderNativeIntakeOverlay(INTAKE_STEPS.find((step) => step.key === "body"));
            };
            this.mediaRecorder.start();
            this.setOverlayStatus("正在录音，完成后点「停止」。", "[data-voice-status]");
          } catch (error) {
            this.setOverlayStatus("没有拿到麦克风权限，可改用文字或图片提交。", "[data-voice-status]");
          }
        }

        stopBodyRecording() {
          if (this.mediaRecorder && this.mediaRecorder.state !== "inactive") {
            this.mediaRecorder.stop();
            this.setOverlayStatus("录音已停止，正在整理。", "[data-voice-status]");
          } else {
            this.setOverlayStatus("当前没有正在录制的语音。", "[data-voice-status]");

        updateBaziFromNativeInputs(overlay, unknownInput) {
          const draft = this.ensureIntakeDraft().bazi;
          const readUnit = (key, fallback) => {
            const value = Number(overlay?.querySelector(`[data-bazi-unit="${key}"]`)?.value);
            return Number.isFinite(value) ? value : fallback;
          };
          draft.year = Phaser.Math.Clamp(readUnit("year", draft.year), 1900, 2026);
          draft.month = Phaser.Math.Clamp(readUnit("month", draft.month), 1, 12);
          draft.day = Phaser.Math.Clamp(readUnit("day", draft.day), 1, new Date(draft.year, draft.month, 0).getDate());
          draft.timeDefaulted = Boolean(unknownInput?.checked);
          if (draft.timeDefaulted) {
            draft.hour = BAZI_DEFAULT_TIME.hour;
            draft.minute = BAZI_DEFAULT_TIME.minute;
          } else {
            draft.hour = Phaser.Math.Clamp(readUnit("hour", draft.hour), 0, 23);

          draft.psychologyActiveQuestionKey = null;

          const activeStep = INTAKE_STEPS.find((step) => step.key === this.gameplay.activeIntake) || INTAKE_STEPS[0];
          const neededCategoriesToGenerate = Math.max(0, INTAKE_MIN_REQUIRED - submitted.length);
          return {
            order: INTAKE_STEPS.map((step) => step.key),
            submitted,
            skipped,
            submittedCount: submitted.length,
            skippedCount: skipped.length,
            remainingSkipCount: Math.max(0, 2 - skipped.length),
            neededCategoriesToGenerate,
            canGenerateProfile: neededCategoriesToGenerate === 0,
            nextQuestion: {
              id: `next_${activeStep.key}`,
              dimension: activeStep.dimension,
              question: activeStep.prompt,
              reason: activeStep.enginePurpose,
              priority: activeStep.key === "psychology" ? "high" : "medium",

            stages: INTAKE_STEPS.map((step) => ({
              key: step.key,
              label: step.label,

        commitSignal(stepKey, signalInput, value = "", confidence = "medium") {
          const step = INTAKE_STEPS.find((item) => item.key === stepKey);
          if (!step) return;
          const input = typeof signalInput === "object" && signalInput
            ? signalInput
            : { type: signalInput, value, confidence };
          const signalType = input.type || step.primarySignal;
          const signalValue = input.value || value || input.label || step.prompt;
          const signalId = `sig_${stepKey}_${signalType}`;
          const rawInputId = `input_${stepKey}_${signalType}`;
          const signalConfidence = input.confidence || confidence || "medium";
          const modality = input.modality || "text";
          const sourceKind = input.sourceKind || (modality === "voice" ? "voice_recording" : modality === "image" ? "uploaded_image" : "typed_text");
          const rawInputSource = input.raw_input_source || {
            kind: sourceKind,
            ...(modality === "voice" ? { duration_ms: input.duration_ms || 12000, mime_type: "audio/webm" } : {}),
            ...(modality === "image" ? { width: input.width || 1280, height: input.height || 960, mime_type: "image/jpeg" } : {}),
          };
          const rawInputQuality = input.raw_input_quality || input.quality || { status: "high", issues: [], should_retry: false };
          this.gameplay.submitted[stepKey] = true;
          this.gameplay.skipped = this.gameplay.skipped.filter((key) => key !== stepKey);
          const signal = {
            id: signalId,
            category: stepKey,
            modality,
            type: signalType,
            value: signalValue,
            normalized_value: input.normalized_value || {
              category: stepKey,
              choice: input.key || signalType,
              label: input.label || step.label,
            },
            confidence: signalConfidence,
            dimension_hint: [step.dimension],
            evidence: input.evidence || [{
              kind: modality === "image" ? "image_observation" : modality === "voice" ? "transcript_span" : "user_report",
              id: rawInputId,
              quote: signalValue,
            }],
            safety: {
              usage: INTAKE_SAFE_USAGE,
              must_not: ["医学诊断", "心理诊断", "治疗承诺", "宿命定论"],
              requires_escalation: false,
            },
            raw_input_id: rawInputId,
            raw_input_source: rawInputSource,
            raw_input_quality: rawInputQuality,
            created_at: "2026-07-05T00:00:00.000Z",
          };
          if (modality === "text") {
            signal.raw_text = input.raw_text || signalValue;
            signal.language = "zh-CN";
          }
          if (modality === "voice") {
            signal.transcript = input.transcript || signalValue;
            signal.transcript_confidence = input.transcript_confidence || signalConfidence;
            signal.delivery_features = input.delivery_features || [
              { type: "pause_density", value: "停顿略多，作为压力线索的低置信参考", confidence: "low", usage_constraint: "只用于互动追问，不用于心理诊断" },
            ];
          }
          if (modality === "image") {
            signal.image_type = input.image_type || "tongue";
            signal.quality = rawInputQuality;
            signal.observations = input.observations || [
              { type: "image_quality_note", value: "原型占位图片，等待视觉模型提取舌象、面色或手部观察", confidence: "low" },
            ];
            signal.forbidden_inferences = ["identity", "age", "gender", "ethnicity", "disease_diagnosis", "mental_health_diagnosis", "fate_certainty", "high_stakes_decision"];
          }
          this.gameplay.signals = this.gameplay.signals.filter((item) => item.category !== stepKey);
          this.gameplay.signals.push(signal);
          if (stepKey === "body") this.ensureIntakeDraft().body.activeSubmitMode = null;
          if (stepKey === "psychology") this.ensureIntakeDraft().psychologyActiveQuestionKey = null;
          if (stepKey !== "psychology") {
            const draft = this.ensureIntakeDraft();
            draft.psychologyQuestionKeys = [];
            draft.psychologyAnswers = {};
          }
          this.gameplay.activeIntake = this.nextIntakeKey(stepKey);
          this.syncGameplayState();
        }

        skipIntake(stepKey) {
          if (!this.gameplay.submitted[stepKey] && !this.gameplay.skipped.includes(stepKey) && this.gameplay.skipped.length < 2) {
            this.gameplay.skipped.push(stepKey);
          }
          if (stepKey !== "psychology") {
            const draft = this.ensureIntakeDraft();
            draft.psychologyQuestionKeys = [];
            draft.psychologyAnswers = {};
          }
          this.gameplay.activeIntake = this.nextIntakeKey(stepKey);
          this.syncGameplayState();
        }

        advanceAfterIntakeCommit(stepKey, color = 0x9ebdff) {
          const coverage = this.getCoverage();
          const finalStep = stepKey === INTAKE_STEPS[INTAKE_STEPS.length - 1].key || this.gameplay.activeIntake === stepKey;
          const gate = this.getIntakeGatePoint();
          if (coverage.canGenerateProfile) {
            this.moveHeroTo(gate.x, gate.y, () => {
              this.addSparkBurst(gate.x, gate.y, color, finalStep ? 12 : 7);
              if (finalStep) {
                this.time.delayedCall(120, () => this.transitionToScene("profile", { color }));
              } else {
                this.time.delayedCall(120, () => this.refreshDemoScene());
              }
            }, { color, mood: "focus" });
            return;
          }
          this.time.delayedCall(160, () => this.refreshDemoScene());
        }

        nextIntakeKey(currentKey) {
          const currentIndex = INTAKE_STEPS.findIndex((step) => step.key === currentKey);
          const next = INTAKE_STEPS.slice(currentIndex + 1).find((step) => !this.gameplay.submitted[step.key] && !this.gameplay.skipped.includes(step.key));
          return next ? next.key : currentKey;
        }

        worldPoint(x, y) {
          return {
            x: WORLD_ORIGIN.x + (x - WORLD_ORIGIN.x) * WORLD_SCALE,
            y: WORLD_ORIGIN.y + (y - WORLD_ORIGIN.y) * WORLD_SCALE,
          };
        }

        wellnessPoint(x, y) {
          return {
            x: WORLD_ORIGIN.x + (x - WORLD_ORIGIN.x) * WELLNESS_SCALE,
            y: WORLD_ORIGIN.y + (y - WORLD_ORIGIN.y) * WELLNESS_SCALE,
          };
        }

          return { x: 306, y: 506 };

          g.setPosition(WORLD_ORIGIN.x * (1 - WORLD_SCALE), WORLD_ORIGIN.y * (1 - WORLD_SCALE));

          this.trackSceneObject(g);

        wellnessGraphics(g) {

        worldContainer(c, scale = WORLD_SCALE) {
          const p = this.worldPoint(c.x, c.y);
          c.setPosition(p.x, p.y);
          c.setScale(scale);
          this.trackSceneObject(c);
          return c;
        }

        trackSceneObject(obj) {
          if (obj && this.sceneObjects && !this.sceneObjects.includes(obj)) {
            this.sceneObjects.push(obj);
          }
          return obj;
        }

        addBackground() {
          const g = this.add.graphics().setDepth(0);

          g.fillRect(0, 0, DESIGN_W, DESIGN_H);

          g.fillRect(0, 0, DESIGN_W, 90);
          g.fillStyle(P.bgBand, 0.76);

          this.glow(74, 390, 112, 0x7ce9af, 0.1, 1);

        renderSceneTabs() {
          const group = this.add.container(210, 28).setDepth(940);
          DEMO_SCENES.forEach((scene, index) => {
            const x = index * 40;
            const bg = this.add.graphics();
            const text = this.add.text(x + 18, 12, scene.label, {
              fontFamily: "Inter, sans-serif",
              fontSize: "9.5px",
              fontStyle: "800",
              color: "#f6ecdf",
            }).setOrigin(0.5);
            const hit = this.add.zone(x + 18, 12, 36, 26).setInteractive({ useHandCursor: true });
            hit.on("pointerdown", () => this.transitionToScene(scene.key));
            group.add([bg, text, hit]);
            this.sceneButtons.push({ scene, bg, text, x });
          });
          this.paintSceneTabs();
        }

        paintSceneTabs() {
          this.sceneButtons.forEach(({ scene, bg, text, x }) => {
            const active = scene.key === this.currentDemoScene;
            bg.clear();
            bg.fillStyle(active ? 0xf6ecdf : 0x242337, active ? 0.14 : 0.5);
            bg.fillRoundedRect(x, 0, 36, 24, 12);
            bg.lineStyle(1, active ? 0xf6ecdf : 0xf6ecdf, active ? 0.4 : 0.08);
            bg.strokeRoundedRect(x, 0, 36, 24, 12);
            text.setColor(active ? "#fff7ed" : "#c0b7ca");
          });
        }

        transitionToScene(key, options = {}) {
          if (key === this.currentDemoScene) return;
          if (this.transitionOverlay) this.transitionOverlay.destroy(true);
          const overlay = this.add.container(0, 0).setDepth(1200);
          const g = this.add.graphics();
          g.fillStyle(P.bgDeep, 1);
          g.fillRect(0, 0, DESIGN_W, DESIGN_H);
          const scene = DEMO_SCENES.find((item) => item.key === key);
          const label = this.add.text(DESIGN_W / 2, DESIGN_H / 2 - 10, scene?.title || "", {
            fontFamily: "Inter, sans-serif",
            fontSize: "15px",
            fontStyle: "800",
            color: "#f6ecdf",
          }).setOrigin(0.5);
          const line = this.add.graphics();
          line.lineStyle(2, options.color || 0x9ebdff, 0.72);
          line.lineBetween(144, DESIGN_H / 2 + 20, 246, DESIGN_H / 2 + 20);
          overlay.add([g, label, line]);
          overlay.setAlpha(0);
          this.transitionOverlay = overlay;
          this.tweens.add({
            targets: overlay,
            alpha: 0.9,
            duration: 120,
            ease: "Sine.easeOut",
            onComplete: () => {
              this.showDemoScene(key);
              this.tweens.add({
                targets: overlay,
                alpha: 0,
                duration: 260,
                ease: "Sine.easeOut",
                onComplete: () => {
                  overlay.destroy(true);
                  if (this.transitionOverlay === overlay) this.transitionOverlay = null;
                },
              });
            },
          });
        }

        showDemoScene(key) {
          if (key === this.currentDemoScene) return;
          this.clearDemoScene();
          this.currentDemoScene = key;
          this.paintSceneTabs();
          this.syncGameplayState();
          const scene = DEMO_SCENES.find((item) => item.key === key);
          document.body.dataset.demoScene = key;
          window.__demoScene = key;
          this.renderSceneTitle(scene);
          if (key === "intake") this.renderIntakeScene(scene);
          if (key === "profile") this.renderProfileScene(scene);
          if (key === "wellness") this.renderWellnessScene(scene);
          if (key === "social") this.renderSocialScene(scene);
          this.addWalkableZone();
          this.renderHero();
        }

        clearDemoScene() {
          this.tweens.killAll();
          this.gameplay.activeLiveTool = null;
          this.hideIntakeOverlay();
          this.heroIdleTween = null;
          this.signals.forEach((signal) => {
            signal.container?.destroy();
            signal.hit?.destroy();
          });
          this.signals = [];
          if (this.profileCard) this.profileCard.destroy(true);
          if (this.beam) this.beam.destroy(true);
          if (this.axisRail) this.axisRail.destroy(true);
          if (this.sceneTitle) this.sceneTitle.destroy(true);
          this.profileCard = null;
          this.beam = null;
          this.axisRail = null;
          this.sceneTitle = null;
          delete document.body.dataset.isoAxis;
          delete document.body.dataset.isoLabel;
          this.sceneObjects.forEach((obj) => {
            if (obj && obj.active !== false) obj.destroy(true);
          });
          this.sceneObjects = [];
        }

        refreshDemoScene() {
          const key = this.currentDemoScene;
          this.currentDemoScene = null;
          this.showDemoScene(key);
        }

          const isLiveOverlayOpen = () => {
            const overlay = this.getIntakeOverlay();
            return overlay?.dataset.visible === "true" && overlay?.dataset.mode === "wellness";

            bg.fillRoundedRect(0, 0, width, height, 12);
            bg.lineStyle(1.2, color, 0.58);
            bg.strokeRoundedRect(0, 0, width, height, 12);

            if (isLiveOverlayOpen()) return;
            onClick();

        renderIntakeStepper() {
          const y = 136;
          const line = this.add.graphics().setDepth(808);
          line.lineStyle(1.4, 0xf6ecdf, 0.16);
          line.lineBetween(55, y + 14, 335, y + 14);
          this.trackSceneObject(line);
          INTAKE_STEPS.forEach((step, index) => {
            const status = this.getCoverage().stages.find((item) => item.key === step.key)?.status;
            const x = 36 + index * 88;
            const group = this.add.container(x, y).setDepth(810);
            const g = this.add.graphics();
            const fill = status === "submitted" ? step.color : status === "skipped" ? 0x4b4656 : status === "active" ? P.card : 0x242337;
            const alpha = status === "submitted" ? 0.95 : status === "active" ? 0.92 : 0.72;
            g.fillStyle(fill, alpha);
            g.fillCircle(18, 14, status === "active" ? 17 : 14);
            g.lineStyle(1.2, status === "active" ? 0xf6ecdf : step.color, status === "waiting" ? 0.18 : 0.58);
            g.strokeCircle(18, 14, status === "active" ? 17 : 14);
            if (status === "submitted") {
              g.lineStyle(1.2, 0xf6ecdf, 0.8);
              g.lineBetween(12, 14, 16, 19);
              g.lineBetween(16, 19, 25, 9);
            }
            const text = this.add.text(18, 42, step.label, {
              fontFamily: "Inter, sans-serif",
              fontSize: "10.5px",
              fontStyle: "800",
              color: status === "waiting" ? "#c0b7ca" : "#fff7ed",
            }).setOrigin(0.5);
            const hit = this.add.zone(18, 18, 62, 66).setInteractive({ useHandCursor: true });
            hit.on("pointerdown", () => {
              if (status === "waiting") return;
              this.gameplay.activeIntake = step.key;
              this.syncGameplayState();
              this.refreshDemoScene();
            });
            group.add([g, text, hit]);
            this.trackSceneObject(group);
          });
        }

          const group = this.add.container(gate.x, gate.y).setDepth(760);

          g.strokeEllipse(0, 2, 34, 28);

          const text = this.add.text(0, 48, "画像门", {

            fontSize: "11px",

            color: "#fff7ed",

          }).setOrigin(0.5);

        addSparkBurst(x, y, color, count = 8) {
          for (let i = 0; i < count; i += 1) {
            const dot = this.add.circle(x, y, Phaser.Math.Between(2, 4), color, 0.92).setDepth(900);
            this.trackSceneObject(dot);
            this.tweens.add({
              targets: dot,
              x: x + Phaser.Math.Between(-38, 38),
              y: y + Phaser.Math.Between(-34, 24),

              duration: 420 + i * 24,
              ease: "Sine.easeOut",

        getHeroSceneEntryPoint(sceneKey = this.currentDemoScene) {
          if (sceneKey === "profile") return this.worldPoint(178, 352);
          if (sceneKey === "wellness") return this.wellnessPoint(154, 430);
          if (sceneKey === "social") return { x: 195, y: 434 };
          if (this.gameplay.activeIntake === "mbti" && !this.gameplay.hero.born) return { x: 195, y: 292 };
          return { x: 195, y: 430 };
        }

        ensureHeroScene() {
          const hero = this.gameplay.hero;
          if (!this.currentDemoScene) return;
          if (hero.scene !== this.currentDemoScene) {
            const point = this.getHeroSceneEntryPoint(this.currentDemoScene);
            hero.scene = this.currentDemoScene;
            hero.x = point.x;
            hero.y = point.y;
          }
        }

        renderHero() {
          this.ensureHeroScene();
          if (this.heroActor) {
            this.heroActor.destroy(true);
            this.heroActor = null;
          }
          const hero = this.gameplay.hero;
          const actor = this.add.container(hero.x, hero.y).setDepth(880);
          const g = this.add.graphics();
          if (!hero.born) {
            this.drawHeroOrb(g);
          } else {
            this.drawHeroPerson(g, hero.facing, hero.mood);
          }
          actor.add(g);
          this.heroActor = actor;
          this.startHeroIdle();
          this.syncGameplayState();
        }

        drawHeroOrb(g) {
          g.fillStyle(0x050712, 0.28);
          g.fillEllipse(0, 28, 40, 12);
          for (let i = 4; i >= 1; i -= 1) {
            g.fillStyle(i % 2 ? 0x9ebdff : 0xf593bb, 0.13 / i);
            g.fillCircle(0, -4, i * 14);
          }
          g.lineStyle(1.8, 0xf6ecdf, 0.72);
          g.strokeCircle(0, -4, 18);
          g.lineStyle(1.1, 0xf593bb, 0.64);
          g.strokeCircle(0, -4, 27);
          g.fillStyle(0xf6ecdf, 1);
          g.fillCircle(0, -4, 8);
          g.fillStyle(0x9ebdff, 0.92);
          g.fillCircle(-8, -14, 3);
          g.fillStyle(0xf593bb, 0.92);
          g.fillCircle(10, 8, 3);
        }

        drawHeroPerson(g, facing, mood) {
          const dir = facing === "left" ? -1 : 1;
          const accent = mood === "focus" ? 0x8edab2 : mood === "social" ? 0xf593bb : 0x9ebdff;
          g.fillStyle(0x050712, 0.34);
          g.fillEllipse(0, 26, 42, 12);
          g.fillStyle(0x2b2435, 1);
          g.fillRoundedRect(-12, -18, 24, 34, 10);
          g.fillStyle(0x765168, 1);
          g.fillRoundedRect(-11, -5, 22, 26, 8);
          g.fillStyle(accent, 0.95);
          g.fillRoundedRect(-5, 2, 10, 8, 3);
          g.fillStyle(0xf1c4aa, 1);
          g.fillCircle(0, -25, 13);
          g.fillStyle(0x2b2435, 1);
          g.fillEllipse(-2 * dir, -31, 28, 15);
          g.fillCircle(-4 + dir * 3, -26, 1.8);
          g.fillCircle(4 + dir * 3, -26, 1.8);
          g.fillStyle(0xbf6c7b, 0.9);
          g.fillCircle(dir * 3, -19, 1.8);
          g.lineStyle(2, 0x2c2434, 1);
          g.lineBetween(-7, 17, -17, 28);

        startHeroIdle() {
          if (!this.heroActor || this.heroBusy) return;
          if (this.heroIdleTween) this.heroIdleTween.stop();
          const baseY = this.heroActor.y;
          this.heroIdleTween = this.tweens.add({
            targets: this.heroActor,
            y: baseY - (this.gameplay.hero.born ? 2.4 : 4),
            duration: this.gameplay.hero.born ? 980 : 760,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
        }

        addHeroPathCue(startX, startY, endX, endY, color) {
          const steps = 5;
          for (let i = 1; i <= steps; i += 1) {
            const t = i / (steps + 1);
            const dot = this.add.circle(
              Phaser.Math.Linear(startX, endX, t),
              Phaser.Math.Linear(startY, endY, t) + Math.sin(t * Math.PI) * 7,
              2.2,
              color,
              0.62
            ).setDepth(870);
            this.trackSceneObject(dot);
            this.tweens.add({
              targets: dot,
              alpha: 0,
              scale: 0.28,
              duration: 360 + i * 38,
              ease: "Sine.easeOut",
              onComplete: () => dot.destroy(),
            });
          }
          const ring = this.add.graphics().setDepth(868);
          ring.lineStyle(1.6, color, 0.78);
          ring.strokeEllipse(endX, endY + 22, 36, 13);
          this.trackSceneObject(ring);
          this.tweens.add({
            targets: ring,
            alpha: 0,
            duration: 480,
            ease: "Sine.easeOut",
            onComplete: () => ring.destroy(),
          });
        }

        moveHeroTo(x, y, onArrive, options = {}) {
          if (this.heroBusy) return;
          if (!this.heroActor) this.renderHero();
          const hero = this.gameplay.hero;
          const actor = this.heroActor;
          if (!actor) return;
          const color = options.color || 0x9ebdff;
          if (this.heroIdleTween) this.heroIdleTween.stop();
          this.tweens.killTweensOf(actor);
          hero.facing = x < actor.x ? "left" : "right";
          hero.mood = options.mood || hero.mood || "curious";
          this.heroBusy = true;
          this.drawHeroPersonOrOrbForMove();
          this.addHeroPathCue(actor.x, actor.y, x, y, color);
          this.syncGameplayState();
          const distance = Phaser.Math.Distance.Between(actor.x, actor.y, x, y);
          this.tweens.add({
            targets: actor,
            x,
            y,
            duration: Phaser.Math.Clamp(distance * 3.8, 260, 760),
            ease: "Sine.easeInOut",
            onComplete: () => {
              hero.x = x;
              hero.y = y;
              hero.scene = this.currentDemoScene;
              this.heroBusy = false;
              this.startHeroIdle();
              this.syncGameplayState();
              if (onArrive) onArrive();
            },
          });
        }

        drawHeroPersonOrOrbForMove() {
          if (!this.heroActor) return;
          this.heroActor.removeAll(true);
          const g = this.add.graphics();
          if (this.gameplay.hero.born) {
            this.drawHeroPerson(g, this.gameplay.hero.facing, this.gameplay.hero.mood);
          } else {
            this.drawHeroOrb(g);
          }
          this.heroActor.add(g);
        }

          this.addSparkBurst(x, y - 18, 0x9ebdff, 14);

        updateBaziDraft(field, delta) {
          const draft = this.ensureIntakeDraft().bazi;
          const limits = {
            year: [1900, 2026],
            month: [1, 12],
            hour: [0, 23],
            minute: [0, 55],
          };
          if (field === "day") {
            const maxDay = new Date(draft.year, draft.month, 0).getDate();
            draft.day = Phaser.Math.Clamp(draft.day + delta, 1, maxDay);
          } else if (limits[field]) {
            draft[field] = Phaser.Math.Clamp(draft[field] + delta, limits[field][0], limits[field][1]);
          }
          if (field === "year" || field === "month") {
            draft.day = Phaser.Math.Clamp(draft.day, 1, new Date(draft.year, draft.month, 0).getDate());
          }
          if (field === "hour" || field === "minute") draft.timeDefaulted = false;
          this.syncGameplayState();
          this.refreshDemoScene();
        }

        commitBaziDraft(timeDefaulted, color) {
          const draft = this.ensureIntakeDraft().bazi;
          if (timeDefaulted) {
            draft.hour = BAZI_DEFAULT_TIME.hour;
            draft.minute = BAZI_DEFAULT_TIME.minute;
            draft.timeDefaulted = true;
          }
          const dateText = `${draft.year}-${String(draft.month).padStart(2, "0")}-${String(draft.day).padStart(2, "0")}`;
          const timeText = `${String(draft.hour).padStart(2, "0")}:${String(draft.minute).padStart(2, "0")}`;
          this.commitSignal("bazi", {
            key: timeDefaulted ? "birth_time_defaulted" : "birth_time_known",
            label: timeDefaulted ? "时分默认" : "出生时间",
            type: "birth_info",
            value: `出生信息：${dateText} ${timeText}${timeDefaulted ? "；时分不清，默认 12:00" : ""}`,
            confidence: timeDefaulted ? "low" : "user_reported",
            normalized_value: {
              category: "bazi",
              birth_year: draft.year,
              birth_month: draft.month,
              birth_day: draft.day,
              birth_hour: draft.hour,
              birth_minute: draft.minute,
              time_defaulted: timeDefaulted,
              default_time: timeDefaulted ? "12:00" : null,
              usage: "culture_story_only",
            },
          });
          this.advanceAfterIntakeCommit("bazi", color);
        }

        addEchoQuestionMarkers() {
          const g = this.add.graphics().setDepth(116);
          this.trackSceneObject(g);
          const draft = this.ensureIntakeDraft();
          const questions = this.getPsychologyQuestions();
          const points = [[104, 314], [196, 396], [288, 472]];
          points.forEach(([x, y], index) => {
            const question = questions[index];
            const key = question?.key;
            const done = Boolean(draft.psychologyAnswers[key]);
            g.fillStyle(done ? 0x8edab2 : 0xf2b263, done ? 0.34 : 0.2);
            g.fillEllipse(x, y, 60, 34);
            g.lineStyle(1.4, done ? 0x8edab2 : 0xf2b263, 0.58);
            g.strokeEllipse(x, y, 60, 34);

              if (!question || this.heroBusy) return;
              this.performHeroAction(x, y + 12, done ? 0x8edab2 : 0xf2b263, () => {
                const activeDraft = this.ensureIntakeDraft();

                this.refreshDemoScene();

        addPsychologyInteractionStage(question) {
          const meta = this.getPsychologyInteractionMeta(question);
          const group = this.add.container(195, 320).setDepth(430);
          const g = this.add.graphics();
          group.add(g);
          g.fillStyle(0x050712, 0.22);
          g.fillEllipse(0, 82, 214, 34);
          g.fillStyle(meta.color, 0.12);
          g.fillRoundedRect(-112, -56, 224, 118, 22);
          g.lineStyle(1.2, meta.color, 0.46);
          g.strokeRoundedRect(-112, -56, 224, 118, 22);

          if (meta.mode === "support") {
            const lights = [
              [-56, "事实", 0x9ebdff],
              [0, "陪伴", 0xf593bb],
              [56, "空间", 0x8edab2],
            ];
            lights.forEach(([x, label, color], index) => {
              g.fillStyle(color, 0.2);
              g.fillRoundedRect(x - 16, -18, 32, 46, 12);
              g.lineStyle(1.1, color, 0.62);
              g.strokeRoundedRect(x - 16, -18, 32, 46, 12);
              g.fillStyle(color, 0.9);
              g.fillCircle(x, -28, 8 + index);
              const text = this.add.text(x, 42, label, {
                fontFamily: "Inter, sans-serif",
                fontSize: "9.5px",
                fontStyle: "850",
                color: "#fff7ed",
              }).setOrigin(0.5);
              group.add(text);
            });
          } else if (meta.mode === "scale") {
            g.lineStyle(2, meta.color, 0.72);
            g.lineBetween(0, -24, 0, 28);
            g.lineBetween(-76, -18, 76, -18);
            g.lineBetween(-56, -18, -76, 16);
            g.lineBetween(-56, -18, -36, 16);
            g.lineBetween(56, -18, 36, 16);
            g.lineBetween(56, -18, 76, 16);
            g.fillStyle(0xf6ecdf, 0.18);
            g.fillEllipse(-56, 18, 66, 18);
            g.fillEllipse(56, 18, 66, 18);
            g.fillStyle(meta.color, 0.9);
            g.fillCircle(0, -26, 7);
          } else if (meta.mode === "compass") {
            g.lineStyle(1.4, meta.color, 0.7);
            g.strokeCircle(0, 2, 46);
            g.strokeCircle(0, 2, 24);
            for (let i = 0; i < 8; i += 1) {
              const a = (Math.PI * 2 * i) / 8;
              g.lineBetween(Math.cos(a) * 18, 2 + Math.sin(a) * 18, Math.cos(a) * 46, 2 + Math.sin(a) * 46);
            }
            g.fillStyle(meta.color, 0.9);
            g.fillTriangle(0, -36, 9, 2, -9, 2);
            g.fillStyle(0xf6ecdf, 0.78);
            g.fillCircle(0, 2, 5);
          } else {
            [-56, 0, 56].forEach((x, index) => {
              g.fillStyle(meta.color, 0.18 + index * 0.04);
              g.fillRoundedRect(x - 22, -16, 44, 42, 12);
              g.lineStyle(1.1, meta.color, 0.56);
              g.strokeRoundedRect(x - 22, -16, 44, 42, 12);
              g.fillStyle(0xf6ecdf, 0.76);
              g.fillCircle(x, 4, 6);
            });
          }

          const title = this.add.text(0, -40, meta.name, {
            fontFamily: "Inter, sans-serif",
            fontSize: "13px",
            fontStyle: "900",
            color: "#fff7ed",
          }).setOrigin(0.5);
          const helper = this.add.text(0, 64, meta.helper, {
            fontFamily: "Inter, sans-serif",
            fontSize: "9.8px",
            fontStyle: "750",
            color: "#e9dfea",
            wordWrap: { width: 196 },
            align: "center",
          }).setOrigin(0.5);
          group.add([title, helper]);
          this.trackSceneObject(group);
          this.tweens.add({
            targets: group,
            y: 316,
            duration: 980,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
        }

        addPsychologyQuestionCard(question, index, stepKey) {
          const answered = Boolean(this.ensureIntakeDraft().psychologyAnswers[question.key]);
          const color = answered ? 0x8edab2 : 0xf2b263;
          const c = this.add.container(question.x, question.y).setDepth(question.y + 130);
          const g = this.add.graphics();
          g.fillStyle(0x050712, 0.22);
          g.fillEllipse(0, 41, 96, 16);
          g.fillStyle(color, answered ? 0.28 : 0.2);
          g.fillRoundedRect(-50, -34, 100, 70, 14);
          g.lineStyle(1.4, answered ? P.cream : color, answered ? 0.72 : 0.58);
          g.strokeRoundedRect(-50, -34, 100, 70, 14);
          if (answered) {
            g.lineStyle(1.6, P.cream, 0.82);
            g.lineBetween(-40, -24, -35, -18);
            g.lineBetween(-35, -18, -25, -29);
          }
          const idx = this.add.text(-40, -25, `0${index + 1}`, {
            fontFamily: "Inter, sans-serif",
            fontSize: "9px",
            fontStyle: "900",
            color: answered ? "#fff7ed" : "#151524",
          });
          const text = this.add.text(0, 4, question.question, {
            fontFamily: "Inter, sans-serif",
            fontSize: "9.5px",
            fontStyle: "800",
            color: "#fff7ed",
            align: "center",
            wordWrap: { width: 82 },
            lineSpacing: 2,
          }).setOrigin(0.5);
          const hit = this.add.zone(0, 2, 104, 78).setInteractive({ useHandCursor: true });
          hit.on("pointerdown", () => {
            if (answered || this.heroBusy) return;
            this.performHeroAction(question.x, question.y + 12, color, () => this.markPsychologyAnswer(question, stepKey));
          });
          c.add([g, idx, text, hit]);
          this.trackSceneObject(c);
        }

        markPsychologyAnswer(question, stepKey) {
          const draft = this.ensureIntakeDraft();
          draft.psychologyAnswers[question.key] = question.answer;
          const questions = this.getPsychologyQuestions();
          const isComplete = questions.every((item) => draft.psychologyAnswers[item.key]);
          if (!isComplete) {
            this.syncGameplayState();
            this.refreshDemoScene();
            return;
          }
          const qa = questions.map((item) => ({
            id: item.key,
            question: item.question,
            answer: draft.psychologyAnswers[item.key],
            type: item.type,
          }));
          this.commitSignal(stepKey, {
            key: "grillme_three_questions",
            label: "心理三问",
            type: "repeated_pattern",
            value: qa.map((item, index) => `Q${index + 1} ${item.question} A ${item.answer}`).join("；"),
            confidence: "medium",
            normalized_value: {
              category: "psychology",
              mode: "grill_me_with_kb_mock",
              question_count: qa.length,
              based_on_categories: this.getCoverage().submitted,
              answers: qa,
              usage: "followup_generation_and_adler_pattern_only",
            },
          });
          this.advanceAfterIntakeCommit(stepKey, 0xf2b263);
        }

        addEchoPath(cx, cy) {
          const g = this.worldGraphics(this.add.graphics().setDepth(90));
          this.shadow(cx, cy + 82, 286, 44, 0.18, 74);
          this.poly(g, [[cx - 118, cy - 48], [cx + 26, cy - 104], [cx + 130, cy + 34], [cx - 18, cy + 94]], 0x56405f, 0.92, P.outline, 2);
          g.lineStyle(1.4, 0xf2b263, 0.38);
          g.lineBetween(cx - 88, cy - 24, cx + 92, cy + 56);
        }

        addEchoStone(stone, index, stepKey) {
          const c = this.add.container(stone.x, stone.y).setDepth(stone.y + 130);
          const g = this.add.graphics();
          g.fillStyle(0x050712, 0.2);
          g.fillEllipse(0, 18, 62, 16);
          g.fillStyle(0xf2b263, 0.26 + index * 0.08);
          g.fillEllipse(0, 0, 56, 34);
          g.lineStyle(1.4, P.cream, 0.46);
          g.strokeEllipse(0, 0, 56, 34);
          const text = this.add.text(0, 39, stone.label, {
            fontFamily: "Inter, sans-serif",
            fontSize: "11px",
            fontStyle: "800",
            color: "#f6ecdf",
            stroke: "#151020",
            strokeThickness: 3,
          }).setOrigin(0.5);
          const hit = this.add.zone(0, 4, 78, 64).setInteractive({ useHandCursor: true });
          hit.on("pointerdown", () => {
            this.performHeroAction(stone.x, stone.y + 10, 0xf2b263, () => {
              this.commitSignal(stepKey, stone);
              this.advanceAfterIntakeCommit(stepKey, 0xf2b263);
            });
          });
          c.add([g, text, hit]);
          this.trackSceneObject(c);
        }

        renderProfileScene() {
          this.addStage();
          this.addStateWeather();
          this.renderCoverageSockets();
          if (!this.getCoverage().canGenerateProfile) {
            this.renderDemoCard("画像还在成形", [
              "至少提交两类采集信号后，四维房间会生成第一版画像。",
              `当前已提交 ${this.getCoverage().submittedCount} 类，可继续回到「采集」。`,
            ], 0xf2b263);
            return;
          }
          AXES.forEach((axis, index) => this.addSignal(axis, index));
          this.renderAxisRail();
          const preferred = AXES.find((axis) => this.getAxisProfile(axis).confidence !== "low") || AXES[1];
          this.selectSignal(preferred, false);
        }

        addStateWeather() {
          const state = this.getProfileOutput().currentState;
          const color = state.value === "positive" ? 0xffd58a : state.value === "negative" ? 0x7f8db8 : 0x9ebdff;
          this.glow(196, 315, state.value === "negative" ? 196 : 154, color, 0.18, 122, true);
          const group = this.add.container(304, 224).setDepth(760);
          const g = this.add.graphics();
          g.fillStyle(0x050712, 0.38);
          g.fillRoundedRect(-36, -26, 72, 52, 16);
          g.lineStyle(1.2, color, 0.64);
          g.strokeRoundedRect(-36, -26, 72, 52, 16);
          const text = this.add.text(0, -2, state.label, {
            fontFamily: "Inter, sans-serif",
            fontSize: "24px",
            fontStyle: "800",
            color: "#fff7ed",
          }).setOrigin(0.5);
          group.add([g, text]);
          this.trackSceneObject(group);
        }

        renderCoverageSockets() {
          const coverage = this.getCoverage();
          const group = this.add.container(22, 505).setDepth(750);
          coverage.stages.forEach((stage, index) => {
            const step = INTAKE_STEPS.find((item) => item.key === stage.key);
            const x = index * 87;
            const g = this.add.graphics();
            const fill = stage.status === "submitted" ? step.color : stage.status === "skipped" ? 0x4b4656 : 0x242337;
            g.fillStyle(fill, stage.status === "submitted" ? 0.94 : 0.78);
            g.fillRoundedRect(x, 0, 72, 46, 13);
            g.lineStyle(1, stage.status === "submitted" ? P.cream : step.color, stage.status === "waiting" ? 0.16 : 0.44);
            g.strokeRoundedRect(x, 0, 72, 46, 13);
            const mark = stage.status === "submitted" ? "已采" : stage.status === "skipped" ? "跳过" : stage.status === "active" ? "当前" : "待补";
            const top = this.add.text(x + 36, 13, step.label, {
              fontFamily: "Inter, sans-serif",
              fontSize: "12px",
              fontStyle: "800",
              color: "#fff7ed",
            }).setOrigin(0.5);
            const bottom = this.add.text(x + 36, 31, mark, {
              fontFamily: "Inter, sans-serif",
              fontSize: "10px",
              color: "#d9d0df",
            }).setOrigin(0.5);
            group.add([g, top, bottom]);
          });
          this.trackSceneObject(group);
        }

        getAxisProfile(axis) {
          return this.getProfileOutput().dimensionValues.find((item) => item.key === axis.key) || {
            name: axis.fullLabel,
            label: axis.title,
            description: axis.summary,
            confidence: "low",
            polarity: "neutral",
          };
        }

        syncWellnessSelection(profileOutput = this.getProfileOutput()) {
          const diagnosis = getXinyuStateDiagnosis(profileOutput);
          const recommendations = getWellnessRecommendations(profileOutput);
          const selectedExists = recommendations.some((item) => item.tool.key === this.gameplay.selectedTool);
          if (this.gameplay.wellnessStateKey === diagnosis.key && selectedExists) return false;
          const top = recommendations[0];
          if (!top) return false;
          this.gameplay.wellnessStateKey = diagnosis.key;
          this.gameplay.selectedHouse = top.house.key;
          this.gameplay.selectedTool = top.tool.key;
          return true;
        }

        getSelectedWellnessRecommendation(profileOutput = this.getProfileOutput()) {
          const houseRecommendations = getWellnessRecommendations(profileOutput, this.gameplay.selectedHouse);
          return houseRecommendations.find((item) => item.tool.key === this.gameplay.selectedTool) || houseRecommendations[0] || getWellnessRecommendations(profileOutput)[0];
        }

        renderWellnessScene() {
          const profileOutput = this.getProfileOutput();
          if (this.syncWellnessSelection(profileOutput)) {
            this.syncGameplayState();
          }
          this.addSeaBand();
          this.addWellnessIsland(195, 352);
          WELLNESS_HOUSES.forEach((house) => this.addHouseHotspot(house));
          this.renderWellnessRecommendationRail(profileOutput);
          this.renderWellnessPractice(profileOutput);
        }

        addHouseHotspot(house) {
          const p = this.wellnessPoint(house.x, house.y);

              const top = getWellnessRecommendations(this.getProfileOutput(), house.key)[0];
              this.gameplay.selectedHouse = house.key;
              if (top) this.gameplay.selectedTool = top.tool.key;
              this.gameplay.actions.push({ type: "house_focus", house: house.key, tool: this.gameplay.selectedTool });
              this.syncGameplayState();
              this.refreshDemoScene();
            }, { mood: "focus" });
          });
          this.trackSceneObject(zone);
          const active = house.key === this.gameplay.selectedHouse;
          const sign = this.add.text(p.x, p.y - 52, house.mark, {
            fontFamily: "Inter, sans-serif",

            fontStyle: "900",

            stroke: "#151020",

          }).setOrigin(0.5).setDepth(694);
          this.trackSceneObject(sign);
          const label = this.add.text(p.x, p.y + 48, house.shop, {
            fontFamily: "Inter, sans-serif",
            fontSize: "10.5px",
            fontStyle: "800",
            color: active ? "#fff0c8" : "#f6ecdf",
            stroke: "#151020",
            strokeThickness: 3,
          }).setOrigin(0.5).setDepth(692);
          this.trackSceneObject(label);
          const interior = this.add.text(p.x, p.y + 62, `${house.label} · ${house.interior}`, {
            fontFamily: "Inter, sans-serif",
            fontSize: "9px",
            fontStyle: "700",
            color: active ? "#fff7ed" : "#c0b7ca",
            stroke: "#151020",
            strokeThickness: 3,
          }).setOrigin(0.5).setDepth(692);
          this.trackSceneObject(interior);

        renderWellnessRecommendationRail(profileOutput = this.getProfileOutput()) {
          const recommendations = getWellnessRecommendations(profileOutput).slice(0, 3);
          const diagnosis = getXinyuStateDiagnosis(profileOutput);
          const group = this.add.container(18, 518).setDepth(735);

        renderWellnessPractice(profileOutput = this.getProfileOutput()) {
          const recommendation = this.getSelectedWellnessRecommendation(profileOutput);
          if (!recommendation) return null;
          const { tool, house } = recommendation;
          const diagnosis = getXinyuStateDiagnosis(profileOutput);
          const saved = this.gameplay.savedTools.includes(tool.key);
          const card = this.renderWellnessToolCard(`${house.label}店长 · ${tool.title}`, [
            `心愈诊断：${diagnosis.label} · ${diagnosis.title}`,
            `为什么：${recommendation.reason}`,
            `今日动作：${tool.action}`,
            `现在就用：${WELLNESS_LIVE_SOURCES[tool.key] || "心愈内置练习"}${saved ? " / 已收藏" : ""}`,
          ], house.color);
          this.renderWellnessHouseToolStrip(recommendation, profileOutput);
          return card;
        }

        renderWellnessHouseToolStrip(recommendation, profileOutput = this.getProfileOutput()) {
          const { house } = recommendation;
          const tools = getWellnessRecommendations(profileOutput, house.key).slice(0, 4);
          const group = this.add.container(26, 746).setDepth(815);
          tools.forEach((item, index) => {
            const x = index * 84;
            const active = item.tool.key === this.gameplay.selectedTool;
            const bg = this.add.graphics();
            bg.fillStyle(active ? house.color : 0x242337, active ? 0.32 : 0.82);
            bg.fillRoundedRect(x, 0, 76, 26, 10);
            bg.lineStyle(1, active ? 0xf6ecdf : house.color, active ? 0.72 : 0.32);
            bg.strokeRoundedRect(x, 0, 76, 26, 10);

              fontFamily: "Inter, sans-serif",

              color: active ? "#fff7ed" : "#d9d0df",
            }).setOrigin(0.5);
            const hit = this.add.zone(x + 38, 13, 76, 26).setInteractive({ useHandCursor: true });
            hit.on("pointerdown", () => {
              this.gameplay.selectedHouse = item.house.key;
              this.gameplay.selectedTool = item.tool.key;
              this.gameplay.activeLiveTool = item.tool.key;
              this.gameplay.actions.push({
                type: "house_tool_open",
                house: item.house.key,
                tool: item.tool.key,
                source: WELLNESS_LIVE_SOURCES[item.tool.key] || "心愈内置内容",
              });
              this.syncGameplayState();
              this.renderWellnessLiveOverlay(item);

          return group;

              `).join("")}
            </div>

          const tracks = WELLNESS_AUDIO_TRACKS[tool.key] || WELLNESS_AUDIO_TRACKS.sound;

            <div class="audio-list">
              ${tracks.map((track) => `
                <div class="audio-card" data-audio-card="${this.escapeHtml(track.title)}">

        getWellnessLiveHtml(recommendation) {
          const { tool, house } = recommendation;
          const source = WELLNESS_LIVE_SOURCES[tool.key] || "心愈内置内容";
          let liveContent = this.getChoiceLiveHtml(tool);
          if (tool.key === "sound" || tool.key === "sleepMeditation") liveContent = this.getAudioLiveHtml(tool);

          if (tool.key === "painting") liveContent = this.getPaintingLiveHtml();
          return `
            <div class="wellness-live-panel" style="--wellness-accent:${this.colorToCss(house.color)}" data-live-tool="${this.escapeHtml(tool.key)}">
              <div class="wellness-live-head">
                <div>
                  <p class="wellness-live-kicker">${this.escapeHtml(house.label)} · ${this.escapeHtml(source)}</p>
                  <h2 class="wellness-live-title">${this.escapeHtml(tool.title)}</h2>
                </div>
                <button class="wellness-close" type="button" aria-label="关闭" data-action="close-wellness-live">×</button>
              </div>
              <p class="wellness-live-copy">${this.escapeHtml(this.getWellnessLiveCopy(tool))}</p>

        startBreathLivePractice(overlay, recommendation) {
          this.stopWellnessLiveTimers();
          const circle = overlay.querySelector("[data-breath-circle]");
          const counter = overlay.querySelector("[data-breath-counter]");
          const button = overlay.querySelector("[data-breath-start]");
          let elapsed = 0;
          const total = 60;
          if (button) button.textContent = "呼吸进行中";
          this.recordWellnessLiveAction(recommendation, {
            action: "breath_start",
            label: "6轮呼吸",
            result: "started",
          });
          this.wellnessBreathTimer = setInterval(() => {
            elapsed += 1;
            const round = Math.min(6, Math.floor((elapsed - 1) / 10) + 1);
            const inCycle = (elapsed - 1) % 10;
            const inhale = inCycle < 4;
            if (circle) {
              circle.textContent = inhale ? "吸" : "呼";
              circle.classList.toggle("is-inhale", inhale);
            }
            if (counter) {
              counter.textContent = `${round}/6 · ${inhale ? "吸气" : "呼气"} · 还剩 ${Math.max(0, total - elapsed)} 秒`;
            }
            if (elapsed >= total) {
              this.stopWellnessLiveTimers();
              if (button) button.textContent = "再做一轮";
              if (counter) counter.textContent = "已完成 6 轮，先停在这里。";
              this.recordWellnessLiveAction(recommendation, {
                action: "breath_complete",
                label: "6轮呼吸",
                result: "completed",
              });
            }
          }, 1000);
        }

        initWellnessSandCanvas(overlay, recommendation) {
          const canvas = overlay.querySelector("[data-sand-canvas]");
          if (!canvas || canvas.dataset.ready === "true") return;
          canvas.dataset.ready = "true";
          const ctx = canvas.getContext("2d", { willReadFrequently: false });
          const width = canvas.width;
          const height = canvas.height;
          const grid = new Uint8Array(width * height);
          const colors = {
            1: [211, 169, 92],
            2: [78, 146, 182],
            3: [84, 132, 82],
            4: [216, 103, 66],
            5: [245, 147, 187],
          };
          const materialNames = { 0: "擦除", 1: "细沙", 2: "清水", 3: "绿芽", 4: "暖光", 5: "今日色" };
          let current = 1;
          let drawing = false;
          let frame = 0;
          let recordedDraw = false;
          const indexAt = (x, y) => y * width + x;
          const isEmpty = (x, y) => x >= 0 && x < width && y >= 0 && y < height && grid[indexAt(x, y)] === 0;
          const swap = (x1, y1, x2, y2) => {
            const first = indexAt(x1, y1);
            const second = indexAt(x2, y2);
            const value = grid[first];
            grid[first] = grid[second];
            grid[second] = value;
          };
          const paint = (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor(((event.clientX - rect.left) / rect.width) * width);
            const y = Math.floor(((event.clientY - rect.top) / rect.height) * height);
            const radius = current === 0 ? 9 : 5;
            for (let dy = -radius; dy <= radius; dy += 1) {
              for (let dx = -radius; dx <= radius; dx += 1) {
                if (dx * dx + dy * dy > radius * radius) continue;
                const px = x + dx;
                const py = y + dy;
                if (px < 0 || px >= width || py < 0 || py >= height) continue;
                grid[indexAt(px, py)] = current;
              }
            }
          };
          const step = () => {
            frame += 1;
            for (let y = height - 2; y >= 0; y -= 1) {
              const direction = frame % 2 === 0 ? 1 : -1;
              for (let offset = 0; offset < width; offset += 1) {
                const x = direction === 1 ? offset : width - 1 - offset;
                const value = grid[indexAt(x, y)];
                if (value === 1 || value === 5) {
                  if (isEmpty(x, y + 1) || grid[indexAt(x, y + 1)] === 2) swap(x, y, x, y + 1);
                  else if (isEmpty(x - direction, y + 1)) swap(x, y, x - direction, y + 1);
                  else if (isEmpty(x + direction, y + 1)) swap(x, y, x + direction, y + 1);
                }
                if (value === 2) {
                  if (isEmpty(x, y + 1)) swap(x, y, x, y + 1);
                  else if (isEmpty(x + direction, y)) swap(x, y, x + direction, y);
                  else if (isEmpty(x - direction, y)) swap(x, y, x - direction, y);
                }
                if (value === 4 && Math.random() > 0.985) grid[indexAt(x, y)] = 0;
                if (value === 3 && y > 0 && !isEmpty(x, y + 1) && Math.random() > 0.996 && isEmpty(x, y - 1)) {
                  grid[indexAt(x, y - 1)] = 3;
                }
              }
            }
          };
          const draw = () => {
            const image = ctx.createImageData(width, height);
            for (let i = 0; i < grid.length; i += 1) {
              const value = grid[i];
              const pixel = i * 4;
              const color = value === 0 ? [250, 246, 235] : colors[value];
              const shade = value === 0 ? 0 : (i + frame) % 5;
              image.data[pixel] = Math.max(0, color[0] - shade);
              image.data[pixel + 1] = Math.max(0, color[1] - shade);
              image.data[pixel + 2] = Math.max(0, color[2] - shade);
              image.data[pixel + 3] = 255;
            }
            ctx.putImageData(image, 0, 0);
          };
          const animate = () => {
            if (!canvas.isConnected) return;
            step();
            draw();
            window.requestAnimationFrame(animate);
          };
          overlay.querySelectorAll("[data-sand]").forEach((button) => {
            button.addEventListener("click", () => {
              current = Number(button.dataset.sand);
              overlay.querySelectorAll("[data-sand]").forEach((item) => item.classList.remove("is-selected"));
              button.classList.add("is-selected");
              this.updateWellnessLiveOutput(overlay, `已选择${materialNames[current]}，按住画布拖动即可。`);
              this.recordWellnessLiveAction(recommendation, {
                action: "sand_material",
                label: materialNames[current],
                result: `${current}`,
              });
            });
          });
          overlay.querySelector("[data-sand-clear]")?.addEventListener("click", () => {
            grid.fill(0);
            this.updateWellnessLiveOutput(overlay, "画布已清空，可以重新开始。");
            this.recordWellnessLiveAction(recommendation, {
              action: "sand_clear",
              label: "清空",
              result: "cleared",
            });
          });
          canvas.addEventListener("pointerdown", (event) => {
            drawing = true;
            canvas.setPointerCapture(event.pointerId);
            paint(event);
            if (!recordedDraw) {
              recordedDraw = true;
              this.recordWellnessLiveAction(recommendation, {
                action: "sand_draw",
                label: materialNames[current],
                result: "started",
              });
            }
          });
          canvas.addEventListener("pointermove", (event) => {
            if (drawing) paint(event);
          });
          canvas.addEventListener("pointerup", () => {
            drawing = false;
          });
          canvas.addEventListener("pointercancel", () => {
            drawing = false;
          });
          draw();
          animate();
        }

        runPracticeAction(recommendation, result, color) {
          const { house, tool } = recommendation;
          const p = this.wellnessPoint(house.x, house.y);
          this.performHeroAction(p.x, p.y + 24, color, () => {
            if (result === "save" && !this.gameplay.savedTools.includes(tool.key)) {
              this.gameplay.savedTools.push(tool.key);
            }
            this.gameplay.selectedHouse = house.key;
            this.gameplay.selectedTool = tool.key;
            this.gameplay.activeLiveTool = result === "try" ? tool.key : null;
            this.gameplay.actions.push({
              type: "practice_selected",
              house: house.key,

              state: getXinyuStateDiagnosis(this.getProfileOutput()).key,

          posts.forEach(([x, y], index) => {

        drawMiniDock(g, x, y, color, reverse = false) {

            const px = x - 22 * slope + i * 11 * slope;

        drawTownStreetDetails(g, cx, cy) {
          const lanePavers = [
            [cx - 136, cy + 20, -1], [cx - 102, cy + 32, -1], [cx - 68, cy + 43, -1],
            [cx + 60, cy + 64, 1], [cx + 98, cy + 54, 1], [cx + 132, cy + 42, 1],

              [x + 7, y - 3 + tilt],
              [x + 8, y + 4],
              [x - 6, y + 4 - tilt],
            ], index % 2 ? 0xf0d8bc : 0xf6ecdf, 0.18, 0xf6ecdf, 0);

            [cx - 160, cy + 108, 5, 12, 0x8edab2],

        drawDistrictMiniTown(g, house) {

        drawTownAccessory(g, x, y, color, type) {

          if (type === "drawerHut" || type === "miniStudy") {
            this.drawMiniTownHouse(g, x, y, color, type);

          }
          if (type === "dryingRack") {
            g.fillStyle(0x050712, 0.14);
            g.fillEllipse(x, y + 18, 62, 13);

            g.lineBetween(x - 28, y - 6, x + 28, y - 6);

          if (type === "mortar") {

            g.fillRoundedRect(x - 18, y + 2, 36, 8, 3);

            g.fillEllipse(x, y - 3, 22, 12);

          if (type === "cushionYard") {

            g.fillEllipse(x, y + 18, 70, 20);

              const angle = (Math.PI * 2 * i) / 5;
              const px = x + Math.cos(angle) * 22;
              const py = y + 5 + Math.sin(angle) * 8;
              g.fillStyle(i % 2 ? color : 0xf6ecdf, 0.74);
              g.fillEllipse(px, py, 18, 8);
            }
            g.fillStyle(0xf6ecdf, 0.66);
            g.fillCircle(x, y + 5, 4);
            return;
          }
          if (type === "bell") {
            g.lineStyle(2, 0x6b4d5f, 0.88);
            g.lineBetween(x - 16, y + 20, x - 16, y - 24);
            g.lineBetween(x - 16, y - 24, x + 18, y - 24);
            g.lineBetween(x + 18, y - 24, x + 18, y - 8);
            g.fillStyle(color, 0.88);
            g.fillEllipse(x + 18, y - 5, 14, 13);
            g.fillStyle(0xf6ecdf, 0.72);
            g.fillCircle(x + 18, y + 2, 2);
            return;
          }
          if (type === "lanternGate") {
            g.lineStyle(2.2, 0x2b2435, 0.92);
            g.lineBetween(x - 22, y + 20, x - 22, y - 22);
            g.lineBetween(x + 22, y + 20, x + 22, y - 22);
            g.lineBetween(x - 28, y - 20, x + 28, y - 20);
            [x - 14, x + 14].forEach((px) => {
              g.fillStyle(color, 0.2);
              g.fillCircle(px, y - 5, 13);
              g.fillStyle(0xf6ecdf, 0.8);
              g.fillCircle(px, y - 5, 4);
            });
            return;
          }
          if (type === "pond") {
            g.fillStyle(0x274b5c, 0.64);
            g.fillEllipse(x, y + 8, 58, 28);
            g.lineStyle(1.4, color, 0.58);
            g.strokeEllipse(x, y + 8, 58, 28);
            g.fillStyle(0xf6ecdf, 0.52);
            g.fillEllipse(x - 17, y + 4, 9, 4);
            g.fillEllipse(x + 14, y + 13, 11, 4);
            return;
          }
          if (type === "bookKiosk") {
            this.drawTownStall(g, x, y, color, "book");

          }
          if (type === "scrollRack") {
            g.fillStyle(0x050712, 0.14);
            g.fillEllipse(x, y + 17, 54, 12);
            g.lineStyle(2, 0xf0d8bc, 0.76);
            g.lineBetween(x - 24, y - 12, x - 24, y + 18);
            g.lineBetween(x + 24, y - 12, x + 24, y + 18);
            for (let i = 0; i < 4; i += 1) {
              g.fillStyle(i % 2 ? color : 0xf6ecdf, 0.76);
              g.fillRoundedRect(x - 17 + i * 10, y - 10, 7, 24, 3);
            }
            return;
          }
          if (type === "thinkingBench") {
            this.drawPlazaBench(g, x, y, color);
            g.fillStyle(color, 0.28);
            g.fillCircle(x + 32, y - 22, 10);
            g.fillStyle(0xf6ecdf, 0.7);
            g.fillCircle(x + 28, y - 23, 1.8);
            g.fillCircle(x + 32, y - 23, 1.8);
            g.fillCircle(x + 36, y - 23, 1.8);
            return;
          }
          if (type === "easel") {
            g.lineStyle(2, 0x6b4d5f, 0.92);
            g.lineBetween(x - 14, y + 22, x - 4, y - 14);
            g.lineBetween(x + 14, y + 22, x + 4, y - 14);
            g.lineBetween(x - 8, y + 6, x + 8, y + 6);
            g.fillStyle(0xf6ecdf, 0.9);
            g.fillRoundedRect(x - 12, y - 16, 24, 18, 2);
            g.fillStyle(color, 0.7);
            g.fillCircle(x - 3, y - 8, 3);
            g.fillStyle(0xf2b263, 0.7);
            g.fillCircle(x + 6, y - 5, 2.4);
            return;
          }
          if (type === "pigmentCart") {
            g.fillStyle(0x050712, 0.15);
            g.fillEllipse(x, y + 17, 54, 12);
            g.fillStyle(0xf0d8bc, 0.8);
            g.fillRoundedRect(x - 24, y - 2, 48, 14, 4);
            [0x9ebdff, 0xf2b263, 0x8edab2, color].forEach((paint, index) => {
              g.fillStyle(paint, 0.84);
              g.fillCircle(x - 14 + index * 10, y + 4, 3);

            g.fillStyle(0x6b4d5f, 0.9);
            g.fillCircle(x - 18, y + 14, 3);
            g.fillCircle(x + 18, y + 14, 3);
            return;
          }
          if (type === "sandTray") {
            g.fillStyle(0x050712, 0.16);
            g.fillEllipse(x, y + 16, 62, 13);
            g.fillStyle(0xf0d8bc, 0.82);
            g.fillRoundedRect(x - 28, y - 5, 56, 22, 4);
            g.lineStyle(1, color, 0.62);
            g.lineBetween(x - 20, y + 3, x + 18, y + 9);
            g.lineBetween(x - 14, y + 11, x + 22, y + 1);
            return;
          }
          if (type === "clothLine") {
            g.lineStyle(2, 0x6b4d5f, 0.82);
            g.lineBetween(x - 26, y - 8, x + 28, y - 16);
            g.lineBetween(x - 22, y - 8, x - 28, y + 18);
            g.lineBetween(x + 24, y - 15, x + 30, y + 12);
            [color, 0xf2b263, 0x9ebdff].forEach((paint, index) => {
              g.fillStyle(paint, 0.82);
              g.fillRoundedRect(x - 18 + index * 16, y - 8 - index * 2, 10, 14, 2);
            });

        }

        drawMiniTownHouse(g, x, y, color, type) {
          g.fillStyle(0x050712, 0.15);
          g.fillEllipse(x, y + 22, 56, 13);
          this.poly(g, [[x - 25, y - 3], [x, y - 18], [x + 26, y - 3], [x, y + 12]], color, 0.72, P.outline, 1);

          for (let i = 0; i < 4; i += 1) {

        drawTownStall(g, x, y, color, kind) {
          g.fillStyle(0x050712, 0.16);
