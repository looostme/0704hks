<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>0704hks Mobile Inner Room Spike</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #131427;
        color: #f7efe8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 100%;
        height: 100%;
        min-height: 100%;
        margin: 0;
        overflow: hidden;
        background: #131427;
      }

      #game {
        width: 100vw;
        height: 100vh;
      }

      canvas {
        display: block;
        image-rendering: auto;
      }
    </style>
  </head>
  <body>
    <main id="game" aria-label="0704hks mobile inner-room profile scene"></main>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.88.2/dist/phaser.min.js"></script>
    <script>
      const DESIGN_W = 390;
      const DESIGN_H = 844;
      const RENDER_SCALE = 4;
      const GAME_W = DESIGN_W * RENDER_SCALE;
      const GAME_H = DESIGN_H * RENDER_SCALE;
      const WORLD_SCALE = 0.58;
      const SIGNAL_SCALE = 0.66;
      const WORLD_ORIGIN = { x: 195, y: 330 };

      const P = {
        bg: 0x131427,
        bgBand: 0x1b1d37,
        bgDeep: 0x0c0e1b,
        outline: 0x151524,
        outlineSoft: 0x2a2638,
        wallLeft: 0x5a3655,
        wallRight: 0x323552,
        wallTrim: 0x8a607d,
        floor: 0xa86983,
        floorLit: 0xbf7f98,
        floorSide: 0x5e3d55,
        bridge: 0x875a72,
        bridgeSide: 0x55384f,
        cream: 0xf6ecdf,
        muted: 0xc0b7ca,
        card: 0x766177,
        cardDeep: 0x58475f,
      };

      const AXES = [
        {
          key: "body",
          shortLabel: "身",
          fullLabel: "中医身体",
          nodeLabel: "脉光",
          color: 0x8edab2,
          glow: 0x75f0ae,
          title: "身体画像倾向",
          summary: "作息、消化和冷热感正在形成第一层身体线索。",
          question: "最近三天更怕冷，还是更怕热？",
          x: 74,
          y: 382,
        },
        {
          key: "mind",
          shortLabel: "情",
          fullLabel: "阿德勒心理",
          nodeLabel: "心灯",
          color: 0xf2b263,
          glow: 0xffd58a,
          title: "心理模式倾向",
          summary: "反复卡点、保护策略和关系动作会被读成阿德勒式生活风格线索。",
          question: "最近最反复出现的是拖延、讨好、控制，还是回避？",
          x: 272,
          y: 265,
        },
        {
          key: "spirit",
          shortLabel: "灵",
          fullLabel: "玄学心灵",
          nodeLabel: "命灯",
          color: 0xf593bb,
          glow: 0xff9fc7,
          title: "心灵叙事倾向",
          summary: "人生阶段和行动主题被处理成非决定论的反思入口。",
          question: "你现在更想问事业、关系，还是自我状态？",
          x: 314,
          y: 430,
        },
        {
          key: "mbti",
          shortLabel: "互",
          fullLabel: "MBTI",
          nodeLabel: "镜光",
          color: 0x9ebdff,
          glow: 0xaac9ff,
          title: "互动偏好倾向",
          summary: "表达方式、决策偏好和关系互动开始连成画像。",
          question: "做决定时更先看事实，还是更先看人的感受？",
          x: 154,
          y: 194,
        },
      ];

      const DEMO_SCENES = [
        {
          key: "intake",
          label: "采集",
          title: "采集 · 光团降世",
          subtitle: "MBTI 光团先落入世界，后续身体、八字、问答各自成场。",
        },
        {
          key: "profile",
          label: "结果",
          title: "结果 · 四维房间",
          subtitle: "至少两维画像和当前状态在同一个内心房间里被点亮。",
        },
        {
          key: "wellness",
          label: "调理",
          title: "调理 · 四屋岛",
          subtitle: "岛上四间房子：中医、哲学、冥想、艺术，每间都有店长。",
        },
        {
          key: "social",
          label: "社交",
          title: "社交 · 人格岛",
          subtitle: "海面上漂着多个人格岛，可以左右滑动探索。",
        },
      ];

      const INTAKE_STEPS = [
        { key: "mbti", label: "MBTI", dimension: "mbti", title: "光团降世", color: 0x9ebdff },
        { key: "body", label: "身体", dimension: "tcm_body", title: "身体庭院", color: 0x8edab2 },
        { key: "bazi", label: "八字", dimension: "xuanxue_spirit", title: "时间观星台", color: 0xf593bb },
        { key: "psychology", label: "问答", dimension: "psychology", title: "回声小径", color: 0xf2b263 },
      ];

      const INITIAL_GAMEPLAY_STATE = {
        activeIntake: "mbti",
        submitted: {},
        skipped: [],
        signals: [],
        hero: {
          born: false,
          scene: "intake",
          x: 195,
          y: 310,
          facing: "right",
          mood: "orb",
        },
        selectedHouse: "meditation",
        selectedIsland: "INFP",
        actions: [],
      };

      const WELLNESS_HOUSES = [
        { key: "tcm", label: "中医", dimension: "tcm_body", color: 0x8edab2, x: 124, y: 386, practice: "今晚把睡前 20 分钟留给身体降噪。" },
        { key: "philosophy", label: "哲学", dimension: "psychology", color: 0xf2b263, x: 228, y: 350, practice: "把「必须做好」改写成一个可验证的小命题。" },
        { key: "meditation", label: "冥想", dimension: "current_state", color: 0x9ebdff, x: 192, y: 336, practice: "做 6 次慢呼吸，只观察身体哪里最紧。" },
        { key: "art", label: "艺术", dimension: "mbti", color: 0xf593bb, x: 246, y: 394, practice: "用三个颜色画出今天的情绪天气。" },
      ];

      const SOCIAL_ISLANDS = [
        { label: "INFP", color: 0x9ebdff, x: 88, y: 358, prompt: "适合从共同感受开场，少一点结论，多一点回应。" },
        { label: "ENFJ", color: 0xf593bb, x: 210, y: 342, prompt: "适合给出明确邀请，也留一个可以拒绝的出口。" },
        { label: "ISTJ", color: 0xf2b263, x: 328, y: 374, prompt: "适合从具体安排和可信承诺开始建立连接。" },
        { label: "ENTP", color: 0x8edab2, x: 450, y: 340, prompt: "适合用一个轻巧问题打开讨论，而不是直接定性。" },
      ];

      class MobileInnerRoomScene extends Phaser.Scene {
        constructor() {
          super("MobileInnerRoomScene");
          this.signals = [];
          this.sceneObjects = [];
          this.sceneButtons = [];
          this.sceneTitle = null;
          this.axisRail = null;
          this.selected = null;
          this.profileCard = null;
          this.beam = null;
          this.currentDemoScene = null;
          this.gameplay = JSON.parse(JSON.stringify(INITIAL_GAMEPLAY_STATE));
          this.intakeStepButtons = [];
          this.focusedPair = [];
          this.heroActor = null;
          this.heroIdleTween = null;
          this.heroBusy = false;
        }

        create() {
          this.cameras.main.setBackgroundColor("#131427");
          this.cameras.main.roundPixels = false;
          this.cameras.main.setZoom(RENDER_SCALE);
          this.cameras.main.centerOn(DESIGN_W / 2, DESIGN_H / 2);

          window.__renderInfo = {
            design: `${DESIGN_W}x${DESIGN_H}`,
            backing: `${this.game.canvas.width}x${this.game.canvas.height}`,
            scale: RENDER_SCALE,
            worldScale: WORLD_SCALE,
          };
          document.body.dataset.canvasBacking = `${this.game.canvas.width}x${this.game.canvas.height}`;
          document.body.dataset.worldScale = `${WORLD_SCALE}`;

          this.addBackground();
          this.addHeader();
          this.renderSceneTabs();
          this.syncGameplayState();
          this.showDemoScene("intake");
        }

        syncGameplayState() {
          const coverage = this.getCoverage();
          const profile = this.getProfileOutput();
          const state = {
            activeScene: this.currentDemoScene,
            activeIntake: this.gameplay.activeIntake,
            submitted: { ...this.gameplay.submitted },
            skipped: [...this.gameplay.skipped],
            signals: [...this.gameplay.signals],
            coverage,
            profile,
            hero: { ...this.gameplay.hero },
            selectedHouse: this.gameplay.selectedHouse,
            selectedIsland: this.gameplay.selectedIsland,
            actions: [...this.gameplay.actions],
          };
          window.__gameplayState = state;
          this.writeDebugState("gameplay-state", state);
          document.body.dataset.gameplayScene = this.currentDemoScene || "boot";
          document.body.dataset.activeIntake = this.gameplay.activeIntake;
          document.body.dataset.signalCount = `${this.gameplay.signals.length}`;
          document.body.dataset.canGenerateProfile = coverage.canGenerateProfile ? "true" : "false";
          document.body.dataset.selectedHouse = this.gameplay.selectedHouse;
          document.body.dataset.selectedIsland = this.gameplay.selectedIsland;
          document.body.dataset.actionCount = `${this.gameplay.actions.length}`;
          document.body.dataset.heroBorn = this.gameplay.hero.born ? "true" : "false";
          document.body.dataset.heroMoving = this.heroBusy ? "true" : "false";
          document.body.dataset.heroScene = this.gameplay.hero.scene;
          document.body.dataset.heroPosition = `${Math.round(this.gameplay.hero.x)},${Math.round(this.gameplay.hero.y)}`;
        }

        writeDebugState(id, state) {
          let node = document.getElementById(id);
          if (!node) {
            node = document.createElement("script");
            node.id = id;
            node.type = "application/json";
            document.body.appendChild(node);
          }
          node.textContent = JSON.stringify(state);
        }

        getCoverage() {
          const submitted = INTAKE_STEPS.filter((step) => this.gameplay.submitted[step.key]).map((step) => step.key);
          const skipped = [...this.gameplay.skipped];
          return {
            order: INTAKE_STEPS.map((step) => step.key),
            submitted,
            skipped,
            submittedCount: submitted.length,
            skippedCount: skipped.length,
            remainingSkipCount: Math.max(0, 2 - skipped.length),
            canGenerateProfile: submitted.length >= 2,
            stages: INTAKE_STEPS.map((step) => ({
              key: step.key,
              label: step.label,
              status: this.gameplay.submitted[step.key]
                ? "submitted"
                : skipped.includes(step.key)
                  ? "skipped"
                  : step.key === this.gameplay.activeIntake
                    ? "active"
                    : "waiting",
            })),
          };
        }

        getProfileOutput() {
          const has = (key) => Boolean(this.gameplay.submitted[key]);
          const skipped = (key) => this.gameplay.skipped.includes(key);
          const dimensionValues = [
            {
              key: "body",
              dimension: "tcm_body",
              name: "中医身体",
              value: has("body") ? "sleep_heat_rhythm" : "body_pending",
              label: has("body") ? "睡眠与冷热节律" : skipped("body") ? "身体维度已跳过" : "身体线索待采集",
              description: has("body") ? "身体庭院记录到作息与冷热感，适合作为调理方向参考。" : "当前还缺身体信号，房间里的脉光保持半亮。",
              confidence: has("body") ? "medium" : "low",
              polarity: has("body") ? "neutral" : "negative",
              color: 0x8edab2,
            },
            {
              key: "mind",
              dimension: "psychology",
              name: "阿德勒心理",
              value: has("psychology") ? "protective_pattern" : "psychology_pending",
              label: has("psychology") ? "保护性卡点" : "心理问答待采集",
              description: has("psychology") ? "回声小径记录到反复模式和自我保护目标，可生成一个小行动实验。" : "问答还没有完成，心灯只给出低置信提示。",
              confidence: has("psychology") ? "medium" : "low",
              polarity: has("psychology") ? "negative" : "neutral",
              color: 0xf2b263,
            },
            {
              key: "spirit",
              dimension: "xuanxue_spirit",
              name: "玄学心灵",
              value: has("bazi") ? "timing_reflection" : "bazi_optional",
              label: has("bazi") ? "阶段主题参考" : skipped("bazi") ? "出生时间暂不使用" : "时间线索可选",
              description: has("bazi") ? "观星台记录到出生时间线索，只作为阶段叙事和反思入口。" : "八字维度可以稍后补充；跳过不会阻止先看画像。",
              confidence: has("bazi") ? "low" : "low",
              polarity: "neutral",
              color: 0xf593bb,
            },
            {
              key: "mbti",
              dimension: "mbti",
              name: "MBTI",
              value: has("mbti") ? "intuitive_feeling_clue" : "mbti_pending",
              label: has("mbti") ? "直觉感受型偏好线索" : "互动偏好待采集",
              description: has("mbti") ? "光团记录到表达与决策偏好，可用于关系开场和社交岛推荐。" : "光团还没落地，镜光保持等待。",
              confidence: has("mbti") ? "medium" : "low",
              polarity: has("mbti") ? "positive" : "neutral",
              color: 0x9ebdff,
            },
          ];
          const score = dimensionValues.reduce((sum, item) => sum + (item.polarity === "positive" ? 1 : item.polarity === "negative" ? -1 : 0), 0);
          const currentState = score >= 1
            ? { value: "positive", label: "正", description: "当前有可启动的能量，适合从轻量练习进入。" }
            : score <= -1
              ? { value: "negative", label: "负", description: "当前更像消耗态，先降低评价压力和身体负荷。" }
              : { value: "neutral", label: "平", description: "当前处在观察与整理之间，适合补齐一两个关键信号。" };
          return { dimensionValues, currentState };
        }

        commitSignal(stepKey, signalType, value, confidence = "medium") {
          const step = INTAKE_STEPS.find((item) => item.key === stepKey);
          if (!step) return;
          this.gameplay.submitted[stepKey] = true;
          this.gameplay.skipped = this.gameplay.skipped.filter((key) => key !== stepKey);
          const signal = {
            id: `sig_${stepKey}_${this.gameplay.signals.length + 1}`,
            modality: "text",
            type: signalType,
            value,
            confidence,
            dimension_hint: [step.dimension],
          };
          this.gameplay.signals = this.gameplay.signals.filter((item) => !item.id.startsWith(`sig_${stepKey}_`));
          this.gameplay.signals.push(signal);
          this.gameplay.activeIntake = this.nextIntakeKey(stepKey);
          this.syncGameplayState();
        }

        skipIntake(stepKey) {
          if (!this.gameplay.submitted[stepKey] && !this.gameplay.skipped.includes(stepKey) && this.gameplay.skipped.length < 2) {
            this.gameplay.skipped.push(stepKey);
          }
          this.gameplay.activeIntake = this.nextIntakeKey(stepKey);
          this.syncGameplayState();
        }

        nextIntakeKey(currentKey) {
          const currentIndex = INTAKE_STEPS.findIndex((step) => step.key === currentKey);
          const next = INTAKE_STEPS.slice(currentIndex + 1).find((step) => !this.gameplay.submitted[step.key] && !this.gameplay.skipped.includes(step.key));
          return next ? next.key : currentKey;
        }

        worldPoint(x, y) {
          return {
            x: WORLD_ORIGIN.x + (x - WORLD_ORIGIN.x) * WORLD_SCALE,
            y: WORLD_ORIGIN.y + (y - WORLD_ORIGIN.y) * WORLD_SCALE,
          };
        }

        worldGraphics(g) {
          g.setPosition(WORLD_ORIGIN.x * (1 - WORLD_SCALE), WORLD_ORIGIN.y * (1 - WORLD_SCALE));
          g.setScale(WORLD_SCALE);
          this.trackSceneObject(g);
          return g;
        }

        worldContainer(c, scale = WORLD_SCALE) {
          const p = this.worldPoint(c.x, c.y);
          c.setPosition(p.x, p.y);
          c.setScale(scale);
          this.trackSceneObject(c);
          return c;
        }

        trackSceneObject(obj) {
          if (obj && this.sceneObjects && !this.sceneObjects.includes(obj)) {
            this.sceneObjects.push(obj);
          }
          return obj;
        }

        addBackground() {
          const g = this.add.graphics().setDepth(0);
          g.fillStyle(P.bg, 1);
          g.fillRect(0, 0, DESIGN_W, DESIGN_H);
          g.fillStyle(P.bgDeep, 0.56);
          g.fillRect(0, 0, DESIGN_W, 90);
          g.fillStyle(P.bgBand, 0.76);
          g.fillRect(0, 90, DESIGN_W, 465);
          g.fillStyle(P.bgDeep, 0.38);
          g.fillRect(0, 555, DESIGN_W, DESIGN_H - 555);

          this.glow(196, 310, 270, 0x2e2642, 0.22, 0);
          this.glow(315, 210, 130, 0xffcc8a, 0.13, 1);
          this.glow(74, 390, 112, 0x7ce9af, 0.1, 1);

          const stars = this.add.graphics().setDepth(2);
          [
            [44, 136, 1.3],
            [92, 102, 1.2],
            [325, 132, 1.1],
            [350, 484, 1.2],
            [42, 510, 1.1],
            [286, 512, 1.4],
          ].forEach(([x, y, r], i) => {
            stars.fillStyle(i % 2 ? 0x8b84a6 : P.cream, 0.22);
            stars.fillCircle(x, y, r);
          });
        }

        addHeader() {
          this.add.text(22, 28, "心象地图", {
            fontFamily: "Inter, sans-serif",
            fontSize: "26px",
            fontStyle: "800",
            color: "#f6ecdf",
          }).setDepth(900);

          this.add.text(24, 64, "采集 · 结果 · 调理 · 社交", {
            fontFamily: "Inter, sans-serif",
            fontSize: "13px",
            color: "#c0b7ca",
          }).setDepth(900);
        }

        renderSceneTabs() {
          const group = this.add.container(20, 92).setDepth(940);
          DEMO_SCENES.forEach((scene, index) => {
            const x = index * 88;
            const bg = this.add.graphics();
            const text = this.add.text(x + 36, 16, scene.label, {
              fontFamily: "Inter, sans-serif",
              fontSize: "13px",
              fontStyle: "800",
              color: "#f6ecdf",
            }).setOrigin(0.5);
            const hit = this.add.zone(x + 36, 16, 74, 34).setInteractive({ useHandCursor: true });
            hit.on("pointerdown", () => this.showDemoScene(scene.key));
            group.add([bg, text, hit]);
            this.sceneButtons.push({ scene, bg, text, x });
          });
          this.paintSceneTabs();
        }

        paintSceneTabs() {
          this.sceneButtons.forEach(({ scene, bg, text, x }) => {
            const active = scene.key === this.currentDemoScene;
            bg.clear();
            bg.fillStyle(active ? 0x766177 : 0x242337, active ? 0.95 : 0.74);
            bg.fillRoundedRect(x, 0, 72, 32, 10);
            bg.lineStyle(1, active ? 0xf6ecdf : 0xf6ecdf, active ? 0.28 : 0.1);
            bg.strokeRoundedRect(x, 0, 72, 32, 10);
            text.setColor(active ? "#fff7ed" : "#c0b7ca");
          });
        }

        showDemoScene(key) {
          if (key === this.currentDemoScene) return;
          this.clearDemoScene();
          this.currentDemoScene = key;
          this.paintSceneTabs();
          this.syncGameplayState();
          const scene = DEMO_SCENES.find((item) => item.key === key);
          document.body.dataset.demoScene = key;
          window.__demoScene = key;
          this.renderSceneTitle(scene);
          if (key === "intake") this.renderIntakeScene(scene);
          if (key === "profile") this.renderProfileScene(scene);
          if (key === "wellness") this.renderWellnessScene(scene);
          if (key === "social") this.renderSocialScene(scene);
          this.addWalkableZone();
          this.renderHero();
        }

        clearDemoScene() {
          this.tweens.killAll();
          this.heroIdleTween = null;
          this.signals.forEach((signal) => {
            signal.container?.destroy();
            signal.hit?.destroy();
          });
          this.signals = [];
          if (this.profileCard) this.profileCard.destroy(true);
          if (this.beam) this.beam.destroy(true);
          if (this.axisRail) this.axisRail.destroy(true);
          if (this.sceneTitle) this.sceneTitle.destroy(true);
          this.profileCard = null;
          this.beam = null;
          this.axisRail = null;
          this.sceneTitle = null;
          delete document.body.dataset.isoAxis;
          delete document.body.dataset.isoLabel;
          this.sceneObjects.forEach((obj) => {
            if (obj && obj.active !== false) obj.destroy(true);
          });
          this.sceneObjects = [];
        }

        refreshDemoScene() {
          const key = this.currentDemoScene;
          this.currentDemoScene = null;
          this.showDemoScene(key);
        }

        renderSceneTitle(scene) {
          const group = this.add.container(22, 140).setDepth(910);
          const title = this.add.text(0, 0, scene.title, {
            fontFamily: "Inter, sans-serif",
            fontSize: "18px",
            fontStyle: "800",
            color: "#f6ecdf",
          });
          const subtitle = this.add.text(0, 28, scene.subtitle, {
            fontFamily: "Inter, sans-serif",
            fontSize: "12px",
            color: "#c0b7ca",
            wordWrap: { width: 330 },
            lineSpacing: 4,
          });
          group.add([title, subtitle]);
          this.sceneTitle = group;
        }

        renderDemoCard(title, lines, color = 0x9ebdff) {
          const group = this.add.container(20, 618).setDepth(720);
          const g = this.add.graphics();
          g.fillStyle(0x050712, 0.34);
          g.fillRoundedRect(-4, 8, 350, 132, 16);
          g.fillStyle(P.card, 0.94);
          g.fillRoundedRect(0, 0, 348, 132, 16);
          g.lineStyle(1, 0xf6ecdf, 0.14);
          g.strokeRoundedRect(0, 0, 348, 132, 16);
          g.fillStyle(color, 1);
          g.fillRoundedRect(20, 22, 28, 28, 8);
          const heading = this.add.text(64, 21, title, {
            fontFamily: "Inter, sans-serif",
            fontSize: "18px",
            fontStyle: "800",
            color: "#fff7ed",
            wordWrap: { width: 258 },
          });
          const body = this.add.text(22, 68, lines.join("\n"), {
            fontFamily: "Inter, sans-serif",
            fontSize: "12px",
            color: "#f2eaf2",
            lineSpacing: 6,
            wordWrap: { width: 302 },
          });
          group.add([g, heading, body]);
          this.trackSceneObject(group);

        }

        addChoiceButton(x, y, label, color, onClick, width = 106, height = 38) {
          const group = this.add.container(x, y).setDepth(820);
          const bg = this.add.graphics();
          bg.fillStyle(0x242337, 0.9);
          bg.fillRoundedRect(0, 0, width, height, 12);
          bg.lineStyle(1.2, color, 0.58);
          bg.strokeRoundedRect(0, 0, width, height, 12);
          const text = this.add.text(width / 2, height / 2, label, {
            fontFamily: "Inter, sans-serif",
            fontSize: "12px",
            fontStyle: "800",
            color: "#fff7ed",
          }).setOrigin(0.5);
          const hit = this.add.zone(width / 2, height / 2, width, height).setInteractive({ useHandCursor: true });
          hit.on("pointerover", () => {
            bg.clear();
            bg.fillStyle(color, 0.24);
            bg.fillRoundedRect(0, 0, width, height, 12);
            bg.lineStyle(1.4, 0xf6ecdf, 0.72);
            bg.strokeRoundedRect(0, 0, width, height, 12);
          });
          hit.on("pointerout", () => {
            bg.clear();
            bg.fillStyle(0x242337, 0.9);
            bg.fillRoundedRect(0, 0, width, height, 12);
            bg.lineStyle(1.2, color, 0.58);
            bg.strokeRoundedRect(0, 0, width, height, 12);
          });
          hit.on("pointerdown", onClick);
          group.add([bg, text, hit]);
          this.trackSceneObject(group);
          return group;
        }

        renderIntakeStepper() {
          INTAKE_STEPS.forEach((step, index) => {
            const status = this.getCoverage().stages.find((item) => item.key === step.key)?.status;
            const x = 24 + index * 86;
            const y = 196;
            const group = this.add.container(x, y).setDepth(810);
            const g = this.add.graphics();
            const fill = status === "submitted" ? step.color : status === "skipped" ? 0x4b4656 : status === "active" ? 0x766177 : 0x242337;
            const alpha = status === "submitted" ? 0.94 : status === "active" ? 0.9 : 0.72;
            g.fillStyle(fill, alpha);
            g.fillRoundedRect(0, 0, 72, 32, 10);
            g.lineStyle(1, status === "active" ? 0xf6ecdf : step.color, status === "waiting" ? 0.18 : 0.5);
            g.strokeRoundedRect(0, 0, 72, 32, 10);
            const text = this.add.text(36, 16, step.label, {
              fontFamily: "Inter, sans-serif",
              fontSize: "12px",
              fontStyle: "800",
              color: status === "waiting" ? "#c0b7ca" : "#fff7ed",
            }).setOrigin(0.5);
            const hit = this.add.zone(36, 16, 72, 32).setInteractive({ useHandCursor: true });
            hit.on("pointerdown", () => {
              this.gameplay.activeIntake = step.key;
              this.syncGameplayState();
              this.refreshDemoScene();
            });
            group.add([g, text, hit]);
            this.trackSceneObject(group);
          });
        }

        addSparkBurst(x, y, color, count = 8) {
          for (let i = 0; i < count; i += 1) {
            const dot = this.add.circle(x, y, Phaser.Math.Between(2, 4), color, 0.92).setDepth(900);
            this.trackSceneObject(dot);
            this.tweens.add({
              targets: dot,
              x: x + Phaser.Math.Between(-38, 38),
              y: y + Phaser.Math.Between(-34, 24),
              alpha: 0,
              scale: 0.18,
              duration: 420 + i * 24,
              ease: "Sine.easeOut",
              onComplete: () => dot.destroy(),
            });
          }
        }

        getHeroSceneEntryPoint(sceneKey = this.currentDemoScene) {
          if (sceneKey === "profile") return this.worldPoint(178, 352);
          if (sceneKey === "wellness") return this.worldPoint(164, 432);
          if (sceneKey === "social") return { x: 195, y: 434 };
          if (this.gameplay.activeIntake === "mbti" && !this.gameplay.hero.born) return { x: 195, y: 292 };
          return { x: 195, y: 430 };
        }

        ensureHeroScene() {
          const hero = this.gameplay.hero;
          if (!this.currentDemoScene) return;
          if (hero.scene !== this.currentDemoScene) {
            const point = this.getHeroSceneEntryPoint(this.currentDemoScene);
            hero.scene = this.currentDemoScene;
            hero.x = point.x;
            hero.y = point.y;
          }
        }

        renderHero() {
          this.ensureHeroScene();
          if (this.heroActor) {
            this.heroActor.destroy(true);
            this.heroActor = null;
          }
          const hero = this.gameplay.hero;
          const actor = this.add.container(hero.x, hero.y).setDepth(880);
          const g = this.add.graphics();
          if (!hero.born) {
            this.drawHeroOrb(g);
          } else {
            this.drawHeroPerson(g, hero.facing, hero.mood);
          }
          actor.add(g);
          this.heroActor = actor;
          this.startHeroIdle();
          this.syncGameplayState();
        }

        drawHeroOrb(g) {
          g.fillStyle(0x050712, 0.28);
          g.fillEllipse(0, 28, 40, 12);
          for (let i = 4; i >= 1; i -= 1) {
            g.fillStyle(i % 2 ? 0x9ebdff : 0xf593bb, 0.13 / i);
            g.fillCircle(0, -4, i * 14);
          }
          g.lineStyle(1.8, 0xf6ecdf, 0.72);
          g.strokeCircle(0, -4, 18);
          g.lineStyle(1.1, 0xf593bb, 0.64);
          g.strokeCircle(0, -4, 27);
          g.fillStyle(0xf6ecdf, 1);
          g.fillCircle(0, -4, 8);
          g.fillStyle(0x9ebdff, 0.92);
          g.fillCircle(-8, -14, 3);
          g.fillStyle(0xf593bb, 0.92);
          g.fillCircle(10, 8, 3);
        }

        drawHeroPerson(g, facing, mood) {
          const dir = facing === "left" ? -1 : 1;
          const accent = mood === "focus" ? 0x8edab2 : mood === "social" ? 0xf593bb : 0x9ebdff;
          g.fillStyle(0x050712, 0.34);
          g.fillEllipse(0, 26, 42, 12);
          g.fillStyle(0x2b2435, 1);
          g.fillRoundedRect(-12, -18, 24, 34, 10);
          g.fillStyle(0x765168, 1);
          g.fillRoundedRect(-11, -5, 22, 26, 8);
          g.fillStyle(accent, 0.95);
          g.fillRoundedRect(-5, 2, 10, 8, 3);
          g.fillStyle(0xf1c4aa, 1);
          g.fillCircle(0, -25, 13);
          g.fillStyle(0x2b2435, 1);
          g.fillEllipse(-2 * dir, -31, 28, 15);
          g.fillCircle(-4 + dir * 3, -26, 1.8);
          g.fillCircle(4 + dir * 3, -26, 1.8);
          g.fillStyle(0xbf6c7b, 0.9);
          g.fillCircle(dir * 3, -19, 1.8);
          g.lineStyle(2, 0x2c2434, 1);
          g.lineBetween(-7, 17, -17, 28);
          g.lineBetween(7, 17, 17, 28);
          g.lineBetween(-10, 2, -21, 9);
          g.lineBetween(10, 2, 20, -2);
          g.lineStyle(1.4, accent, 0.72);
          g.strokeCircle(0, -2, 18);

        startHeroIdle() {
          if (!this.heroActor || this.heroBusy) return;
          if (this.heroIdleTween) this.heroIdleTween.stop();
          const baseY = this.heroActor.y;
          this.heroIdleTween = this.tweens.add({
            targets: this.heroActor,
            y: baseY - (this.gameplay.hero.born ? 2.4 : 4),
            duration: this.gameplay.hero.born ? 980 : 760,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
        }

        addHeroPathCue(startX, startY, endX, endY, color) {
          const steps = 5;
          for (let i = 1; i <= steps; i += 1) {
            const t = i / (steps + 1);
            const dot = this.add.circle(
              Phaser.Math.Linear(startX, endX, t),
              Phaser.Math.Linear(startY, endY, t) + Math.sin(t * Math.PI) * 7,
              2.2,
              color,
              0.62
            ).setDepth(870);
            this.trackSceneObject(dot);
            this.tweens.add({
              targets: dot,
              alpha: 0,
              scale: 0.28,
              duration: 360 + i * 38,
              ease: "Sine.easeOut",
              onComplete: () => dot.destroy(),
            });
          }
          const ring = this.add.graphics().setDepth(868);
          ring.lineStyle(1.6, color, 0.78);
          ring.strokeEllipse(endX, endY + 22, 36, 13);
          this.trackSceneObject(ring);
          this.tweens.add({
            targets: ring,
            alpha: 0,
            duration: 480,
            ease: "Sine.easeOut",
            onComplete: () => ring.destroy(),
          });
        }

        moveHeroTo(x, y, onArrive, options = {}) {
          if (this.heroBusy) return;
          if (!this.heroActor) this.renderHero();
          const hero = this.gameplay.hero;
          const actor = this.heroActor;
          if (!actor) return;
          const color = options.color || 0x9ebdff;
          if (this.heroIdleTween) this.heroIdleTween.stop();
          this.tweens.killTweensOf(actor);
          hero.facing = x < actor.x ? "left" : "right";
          hero.mood = options.mood || hero.mood || "curious";
          this.heroBusy = true;
          this.drawHeroPersonOrOrbForMove();
          this.addHeroPathCue(actor.x, actor.y, x, y, color);
          this.syncGameplayState();
          const distance = Phaser.Math.Distance.Between(actor.x, actor.y, x, y);
          this.tweens.add({
            targets: actor,
            x,
            y,
            duration: Phaser.Math.Clamp(distance * 3.8, 260, 760),
            ease: "Sine.easeInOut",
            onComplete: () => {
              hero.x = x;
              hero.y = y;
              hero.scene = this.currentDemoScene;
              this.heroBusy = false;
              this.startHeroIdle();
              this.syncGameplayState();
              if (onArrive) onArrive();
            },
          });
        }

        drawHeroPersonOrOrbForMove() {
          if (!this.heroActor) return;
          this.heroActor.removeAll(true);
          const g = this.add.graphics();
          if (this.gameplay.hero.born) {
            this.drawHeroPerson(g, this.gameplay.hero.facing, this.gameplay.hero.mood);
          } else {
            this.drawHeroOrb(g);
          }
          this.heroActor.add(g);
        }

        completeHeroBirth(x, y) {
          this.gameplay.hero.born = true;
          this.gameplay.hero.scene = this.currentDemoScene;
          this.gameplay.hero.x = x;
          this.gameplay.hero.y = y;
          this.gameplay.hero.mood = "curious";
          this.gameplay.hero.facing = "right";
          this.addSparkBurst(x, y - 18, 0x9ebdff, 14);
          this.renderHero();
        }

        performHeroAction(x, y, color, onArrive, options = {}) {
          this.moveHeroTo(x, y, () => {
            this.addSparkBurst(x, y, color);
            if (onArrive) this.time.delayedCall(options.arriveDelay ?? 140, onArrive);
          }, { color, mood: options.mood || "focus" });
        }

        addWalkableZone() {
          const zone = this.add.zone(195, 378, 348, 332).setDepth(58).setInteractive({ useHandCursor: true });

            if (this.heroBusy) return;
            if (!this.gameplay.hero.born && this.currentDemoScene === "intake" && this.gameplay.activeIntake === "mbti") return;
            const x = Phaser.Math.Clamp(pointer.worldX || pointer.x, 44, 346);

          const dragZone = this.add.zone(195, 365, 390, 280).setDepth(500).setInteractive({ useHandCursor: true });

              const distance = Math.abs(island.x + group.x - 195);

            this.gameplay.selectedIsland = closest.label;

          g.fillCircle(x, y - 22, 8);
          g.lineStyle(2, P.cream, 0.8);
          g.lineBetween(x - 9, y - 8, x, y - 30);
          g.lineBetween(x + 9, y - 8, x, y - 30);
        }

        addSignal(axis, index) {
          const p = this.worldPoint(axis.x, axis.y);
          const c = this.add.container(p.x, p.y).setDepth(axis.y + 210).setScale(SIGNAL_SCALE);
          const glow = this.add.graphics();
          const gem = this.add.graphics();
          const label = this.add.text(0, 35, axis.nodeLabel, {
            fontFamily: "Inter, sans-serif",
            fontSize: "11px",
            fontStyle: "800",
            color: "#f6ecdf",
            stroke: "#151020",
            strokeThickness: 3,
          }).setOrigin(0.5);

          c.add([glow, gem, label]);
          this.paintSignal(glow, gem, axis, false);

          const hit = this.add.zone(p.x, p.y - 5 * WORLD_SCALE, 70, 76).setDepth(axis.y + 320).setInteractive({ useHandCursor: true });
          hit.on("pointerover", () => {
            this.paintSignal(glow, gem, axis, true);
            this.tweens.add({ targets: c, scale: SIGNAL_SCALE * 1.08, duration: 120, ease: "Sine.easeOut" });
          });
          hit.on("pointerout", () => {
            this.paintSignal(glow, gem, axis, this.selected?.key === axis.key);
            this.tweens.add({ targets: c, scale: SIGNAL_SCALE, duration: 140, ease: "Sine.easeOut" });
          });
          hit.on("pointerdown", () => {
            this.moveHeroTo(p.x, p.y + 24, () => this.selectSignal(axis, true), {
              color: axis.color,
              mood: "focus",
            });
          });

          this.tweens.add({
            targets: [c, hit],
            y: p.y - 6 * WORLD_SCALE,
            duration: 1120 + index * 150,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
          this.signals.push({ axis, container: c, glow, gem, hit, point: p });
        }

        paintSignal(glow, gem, axis, active) {
          glow.clear();
          gem.clear();
          const alpha = active ? 0.42 : 0.2;
          for (let i = 4; i >= 1; i -= 1) {
            glow.fillStyle(axis.glow, alpha / (i * 0.95));
            glow.fillCircle(0, -6, i * 14);
          }
          gem.fillStyle(P.outline, 1);
          gem.fillCircle(0, -5, active ? 18 : 16);
          gem.fillStyle(axis.color, 1);
          gem.beginPath();
          gem.moveTo(0, -30);
          gem.lineTo(18, -8);
          gem.lineTo(0, 16);
          gem.lineTo(-18, -8);
          gem.closePath();
          gem.fillPath();
          gem.lineStyle(active ? 2 : 1.4, P.cream, active ? 0.94 : 0.52);
          gem.strokePath();
          gem.fillStyle(0xffffff, active ? 0.82 : 0.5);
          gem.fillCircle(-5, -13, 3.6);
        }

        renderAxisRail() {
          const group = this.add.container(22, 760).setDepth(720);
          this.axisRail = group;
          AXES.forEach((axis, index) => {
            const x = index * 87;
            const g = this.add.graphics();
            g.fillStyle(0x242337, 0.82);
            g.fillRoundedRect(x, 0, 70, 54, 14);
            g.lineStyle(1, 0xf6ecdf, 0.12);
            g.strokeRoundedRect(x, 0, 70, 54, 14);
            g.fillStyle(axis.color, 1);
            g.beginPath();
            g.moveTo(x + 20, 18);
            g.lineTo(x + 30, 27);
            g.lineTo(x + 20, 36);
            g.lineTo(x + 10, 27);
            g.closePath();
            g.fillPath();
            const text = this.add.text(x + 38, 18, axis.shortLabel, {
              fontFamily: "Inter, sans-serif",
              fontSize: "17px",
              fontStyle: "800",
              color: "#f6ecdf",
            });
            group.add([g, text]);
          });
        }

        selectSignal(axis, animate) {
          this.selected = axis;
          this.signals.forEach((signal) => {
            this.paintSignal(signal.glow, signal.gem, signal.axis, signal.axis.key === axis.key);
          });
          this.renderBeam(axis);
          this.renderProfile(axis);
          if (animate) this.spawnBurst(axis);
        }

        renderBeam(axis) {
          if (this.beam) this.beam.destroy(true);
          const p = this.worldPoint(axis.x, axis.y);
          const group = this.add.container(0, 0).setDepth(210);
          const g = this.add.graphics();
          g.lineStyle(1.6, axis.color, 0.28);
          g.lineBetween(p.x, p.y + 14 * WORLD_SCALE, 98, 583);
          g.lineStyle(0.8, P.cream, 0.16);
          g.lineBetween(p.x - 4 * WORLD_SCALE, p.y + 12 * WORLD_SCALE, 82, 586);
          group.add(g);
          group.setAlpha(0);
          this.tweens.add({ targets: group, alpha: 1, duration: 180, ease: "Sine.easeOut" });
          this.beam = group;
        }

        spawnBurst(axis) {
          const p = this.worldPoint(axis.x, axis.y);
          for (let i = 0; i < 7; i += 1) {
            const dot = this.add.circle(p.x + Phaser.Math.Between(-7, 7), p.y + Phaser.Math.Between(-6, 7), Phaser.Math.Between(2, 3), axis.color, 0.9).setDepth(760);
            this.tweens.add({
              targets: dot,
              x: 82 + Phaser.Math.Between(-10, 18),
              y: 596 + Phaser.Math.Between(-10, 18),
              scale: 0.2,
              alpha: 0,
              duration: 480 + i * 42,
              ease: "Sine.easeInOut",
              onComplete: () => dot.destroy(),
            });
          }
        }

        renderProfile(axis) {
          if (this.profileCard) this.profileCard.destroy(true);
          const axisProfile = this.getAxisProfile(axis);
          const confidenceText = axisProfile.confidence === "low" ? "低置信 · 可补采" : axisProfile.confidence === "high" ? "高置信" : "中置信";
          const evidenceCount = this.gameplay.signals.filter((signal) => signal.dimension_hint.includes(axisProfile.dimension)).length;

          const group = this.add.container(20, 552).setDepth(700);
          const g = this.add.graphics();
          g.fillStyle(0x050712, 0.34);
          g.fillRoundedRect(-4, 8, 350, 178, 18);
          g.fillStyle(P.card, 0.96);
          g.fillRoundedRect(0, 0, 348, 178, 18);
          this.poly(g, [[60, 0], [82, -18], [104, 0]], P.card, 0.96, P.card, 1);
          g.fillStyle(0xffffff, 0.08);
          g.fillRoundedRect(18, 22, 62, 62, 14);
          g.fillStyle(axis.color, 1);
          g.fillRoundedRect(28, 31, 42, 42, 11);
          g.lineStyle(1, 0xf6ecdf, 0.14);
          g.strokeRoundedRect(0, 0, 348, 178, 18);

          const face = this.add.graphics();
          face.fillStyle(0x2b2436, 1);
          face.fillRoundedRect(36, 40, 26, 17, 8);
          face.fillStyle(0xf1c4aa, 1);
          face.fillCircle(49, 55, 14);
          face.fillStyle(0x2b2436, 1);
          face.fillCircle(44, 55, 1.9);
          face.fillCircle(54, 55, 1.9);
          face.lineStyle(1.5, 0x925c72, 1);
          face.lineBetween(44, 63, 54, 63);

          const label = this.add.text(96, 25, `${axisProfile.name} · ${confidenceText}`, {
            fontFamily: "Inter, sans-serif",
            fontSize: "13px",
            fontStyle: "800",
            color: "#f6ecdf",
          });
          const title = this.add.text(96, 48, axisProfile.label, {
            fontFamily: "Inter, sans-serif",
            fontSize: "21px",
            fontStyle: "800",
            color: "#ffffff",
            wordWrap: { width: 218 },
          });
          const summary = this.add.text(28, 100, axisProfile.description, {
            fontFamily: "Inter, sans-serif",
            fontSize: "14px",
            color: "#f2eaf2",
            lineSpacing: 6,
            wordWrap: { width: 292 },
          });
          const question = this.add.text(28, 142, evidenceCount > 0 ? `证据火花 ${evidenceCount} 条 · 点其他维度可切换解读` : axis.question, {
            fontFamily: "Inter, sans-serif",
            fontSize: "14px",
            fontStyle: "800",
            color: "#fff0c8",
            wordWrap: { width: 292 },
          });

          group.add([g, face, label, title, summary, question]);
          group.setAlpha(0);
          group.y += 12;
          this.tweens.add({ targets: group, alpha: 1, y: 552, duration: 190, ease: "Sine.easeOut" });
          this.profileCard = group;

          window.__isoSpikeState = {
            selectedAxis: axis.key,
            selectedLabel: axis.fullLabel,
            sourceLabel: axis.nodeLabel,
            dimensionLabel: axisProfile.label,
            evidenceCount,
            layout: "mobile-portrait",
            worldScale: WORLD_SCALE,
          };
          this.syncGameplayState();
          document.body.dataset.isoAxis = axis.key;
          document.body.dataset.isoLabel = axis.fullLabel;
        }

        glow(x, y, radius, color, alpha, depth, world = false) {
          const g = this.add.graphics().setDepth(depth);
          for (let i = 7; i >= 1; i -= 1) {
            g.fillStyle(color, alpha / (i * 1.05));
            g.fillCircle(x, y, (radius / 7) * i);
          }
          if (world) this.worldGraphics(g);
          return g;
        }

        shadow(x, y, w, h, alpha, depth) {
          const g = this.worldGraphics(this.add.graphics().setDepth(depth));
          g.fillStyle(0x050712, alpha);
          g.fillEllipse(x, y, w, h);
        }

        isoBlock(g, x, y, w, d, h, topColor, leftColor, rightColor, strokeWidth) {
          const top = [
            [x, y - d / 2],
            [x + w / 2, y],
            [x, y + d / 2],
            [x - w / 2, y],
          ];
          const left = [
            [x - w / 2, y],
            [x, y + d / 2],
            [x, y + d / 2 + h],
            [x - w / 2, y + h],
          ];
          const right = [
            [x, y + d / 2],
            [x + w / 2, y],
            [x + w / 2, y + h],
            [x, y + d / 2 + h],
          ];
          this.poly(g, left, leftColor, 1, P.outline, strokeWidth);
          this.poly(g, right, rightColor, 1, P.outline, strokeWidth);
          this.poly(g, top, topColor, 1, P.outline, strokeWidth);
          g.lineStyle(0.8, 0xffffff, 0.22);
          g.lineBetween(top[3][0] + 5, top[3][1] - 1, top[0][0] - 5, top[0][1] - d / 2 + 5);
          g.lineBetween(top[0][0] + 5, top[0][1] - d / 2 + 5, top[1][0] - 5, top[1][1] - 1);
        }

        poly(g, points, fill, alpha = 1, stroke = P.outline, strokeWidth = 2) {
          g.fillStyle(fill, alpha);
          g.lineStyle(strokeWidth, stroke, 1);
          g.beginPath();
          g.moveTo(points[0][0], points[0][1]);
          points.slice(1).forEach(([x, y]) => g.lineTo(x, y));
          g.closePath();
          g.fillPath();
          g.strokePath();
        }
      }

      const config = {
        type: Phaser.AUTO,
        parent: "game",
        width: GAME_W,
        height: GAME_H,
        backgroundColor: "#131427",
        render: {
          antialias: true,
          antialiasGL: true,
          pixelArt: false,
          roundPixels: false,
        },
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: [MobileInnerRoomScene],
      };

      window.addEventListener("load", () => {
        new Phaser.Game(config);
      });
    </script>
  </body>
</html>
